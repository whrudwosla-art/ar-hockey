<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ICE DASH — 퍽 추적기</title>
<style>
body { margin:0; background:#000; overflow:hidden; }
#vid, #oc { position:fixed; inset:0; width:100vw; height:100vh; object-fit:cover; transform:scaleX(-1); }
#ui {
  position:fixed; top:0; left:0; right:0;
  background:rgba(8,25,46,.9);
  color:white;
  padding:10px;
  display:flex; gap:10px;
}
#room { margin-left:auto; color:#00ccff; letter-spacing:3px; font-weight:800 }
</style>
</head>

<body>

<video id="vid" autoplay playsinline muted></video>
<canvas id="oc"></canvas>

<div id="ui">
  <div id="status">대기 중</div>
  <div id="room">----</div>
</div>

<script>
/* ============ ROOM ============ */
const roomCode = Math.random().toString(36).substr(2,4).toUpperCase();
document.getElementById('room').textContent = roomCode;

/* ============ SEND ============ */
function send(x,y,conf){
  const p = {x,y,confidence:conf,ts:Date.now(),room:roomCode};
  if (!window._bc) _bc = new BroadcastChannel('icedash_'+roomCode);
  _bc.postMessage(p);
}

/* ============ CAMERA ============ */
const vid = document.getElementById('vid');
const oc = document.getElementById('oc');
const octx = oc.getContext('2d');

async function start(){
  const s = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
  vid.srcObject = s;
  await vid.play();
  oc.width=innerWidth;
  oc.height=innerHeight;
  setup();
  requestAnimationFrame(loop);
}
start();

/* ============ PROCESSING ============ */
const PW=240;
let PH, pc, pctx;
let zone=null, taps=[];

function setup(){
  PH = Math.round(PW * vid.videoHeight / vid.videoWidth);
  pc = document.createElement('canvas');
  pc.width=PW; pc.height=PH;
  pctx=pc.getContext('2d',{willReadFrequently:true});
}

oc.addEventListener('pointerdown',e=>{
  if(zone) return;
  const r=oc.getBoundingClientRect();
  taps.push({
    x:1-(e.clientX-r.left)/r.width,
    y:(e.clientY-r.top)/r.height
  });
  if(taps.length===2){
    zone={x0:Math.min(taps[0].x,taps[1].x),
          y0:Math.min(taps[0].y,taps[1].y),
          x1:Math.max(taps[0].x,taps[1].x),
          y1:Math.max(taps[0].y,taps[1].y)};
  }
});

let smoothX=0.5, smoothY=0.5;

function loop(){
  pctx.save();
  pctx.translate(PW,0); pctx.scale(-1,1);
  pctx.drawImage(vid,0,0,PW,PH);
  pctx.restore();

  if(zone){
    const d=pctx.getImageData(0,0,PW,PH).data;
    const sx0=(zone.x0*PW)|0, sx1=(zone.x1*PW)|0;
    const sy0=(zone.y0*PH)|0, sy1=(zone.y1*PH)|0;

    let sum=0,cnt=0;
    for(let y=sy0;y<sy1;y++)
      for(let x=sx0;x<sx1;x++){
        const i=(y*PW+x)*4;
        sum += d[i]*.299+d[i+1]*.587+d[i+2]*.114;
        cnt++;
      }
    const mean=sum/cnt;
    const th=Math.min(70, mean*0.35);

    let sx=0, sy=0, c=0;
    for(let y=sy0;y<sy1;y++)
      for(let x=sx0;x<sx1;x++){
        const i=(y*PW+x)*4;
        const lum=d[i]*.299+d[i+1]*.587+d[i+2]*.114;
        if(lum<th){ sx+=x; sy+=y; c++; }
      }

    if(c>cnt*0.003){
      smoothX = smoothX*0.85 + ((sx/c - sx0)/(sx1-sx0))*0.15;
      smoothY = smoothY*0.85 + ((sy/c - sy0)/(sy1-sy0))*0.15;
      send(smoothX,smoothY,Math.min(1,c/(cnt*0.05)));
    }
  }

  requestAnimationFrame(loop);
}
</script>

</body>
</html>
