<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ICE DASH — 퍽 추적기</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --accent: #00ccff;
    --bg: #08192e;
    --card: #0e2540;
    --font-title: 'Bebas Neue', cursive;
    --font-body: 'Noto Sans KR', sans-serif;
  }
  body {
    background: var(--bg);
    color: white;
    font-family: var(--font-body);
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 16px;
    gap: 12px;
  }
  h1 {
    font-family: var(--font-title);
    font-size: 28px;
    letter-spacing: 4px;
    color: var(--accent);
    text-shadow: 0 0 14px rgba(0,204,255,0.5);
    margin-top: 8px;
  }
  #status-bar {
    width: 100%;
    max-width: 400px;
    background: var(--card);
    border-radius: 12px;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
  }
  #status-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #ff4444;
    flex-shrink: 0;
    transition: background 0.3s;
  }
  #status-dot.connected { background: #00ff88; box-shadow: 0 0 8px #00ff88; }
  #status-dot.tracking  { background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: pulse 0.8s infinite alternate; }
  @keyframes pulse { from { opacity: 1; } to { opacity: 0.4; } }
  #status-text { flex: 1; color: #99bbcc; }

  #canvas-wrap {
    position: relative;
    width: 100%;
    max-width: 400px;
    border-radius: 16px;
    overflow: hidden;
    border: 2px solid #1a3a5c;
    background: #000;
  }
  #videoEl { width: 100%; display: block; transform: scaleX(-1); }
  #overlayCanvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    transform: scaleX(-1);
  }

  #controls {
    width: 100%;
    max-width: 400px;
    background: var(--card);
    border-radius: 12px;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .ctrl-row {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: #99bbcc;
  }
  .ctrl-row label { min-width: 90px; }
  input[type=range] { flex: 1; accent-color: var(--accent); }
  .val { min-width: 32px; text-align: right; color: white; font-weight: 700; }

  #code-section {
    width: 100%;
    max-width: 400px;
    background: var(--card);
    border-radius: 12px;
    padding: 14px 16px;
    font-size: 13px;
    color: #99bbcc;
    line-height: 1.7;
  }
  #room-code {
    font-family: var(--font-title);
    font-size: 36px;
    letter-spacing: 8px;
    color: var(--accent);
    text-align: center;
    margin: 8px 0 4px;
  }
  .hint { font-size: 12px; color: #445566; text-align: center; }

  #start-btn {
    font-family: var(--font-title);
    font-size: 22px;
    letter-spacing: 3px;
    color: #08192e;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    padding: 14px;
    width: 100%;
    max-width: 400px;
    cursor: pointer;
    box-shadow: 0 0 20px rgba(0,204,255,0.4);
    transition: transform 0.1s, box-shadow 0.1s;
  }
  #start-btn:active { transform: scale(0.97); }

  #debug-info {
    font-size: 12px;
    color: #334455;
    text-align: center;
  }

  .section-title {
    font-family: var(--font-title);
    font-size: 14px;
    letter-spacing: 2px;
    color: #4488aa;
    margin-bottom: 4px;
  }
</style>
</head>
<body>

<h1>🏒 퍽 추적기</h1>

<div id="status-bar">
  <div id="status-dot"></div>
  <div id="status-text">카메라 시작 버튼을 눌러주세요</div>
</div>

<div id="canvas-wrap">
  <video id="videoEl" autoplay playsinline muted></video>
  <canvas id="overlayCanvas"></canvas>
</div>

<div id="controls">
  <div class="section-title">퍽 감지 설정</div>
  <div class="ctrl-row">
    <label>어두움 한계</label>
    <input type="range" id="darkThresh" min="20" max="120" value="60">
    <span class="val" id="darkVal">60</span>
  </div>
  <div class="ctrl-row">
    <label>최소 크기</label>
    <input type="range" id="minSize" min="100" max="3000" step="100" value="400">
    <span class="val" id="sizeVal">400</span>
  </div>
  <div class="ctrl-row">
    <label>감도</label>
    <input type="range" id="smoothing" min="1" max="10" value="5">
    <span class="val" id="smoothVal">5</span>
  </div>
</div>

<div id="code-section">
  <div class="section-title">연결 코드 (게임 화면에 입력)</div>
  <div id="room-code">----</div>
  <div class="hint">같은 와이파이에서 BroadcastChannel로 연결됩니다<br>다른 네트워크라면 게임 화면에서 수동 코드 입력</div>
</div>

<button id="start-btn" onclick="startCamera()">📷 카메라 시작</button>

<div id="debug-info">퍽 X: — &nbsp;|&nbsp; Y: — &nbsp;|&nbsp; 픽셀: —</div>

<script>
const video = document.getElementById('videoEl');
const overlay = document.getElementById('overlayCanvas');
const octx = overlay.getContext('2d');
const statusDot = document.getElementById('status-dot');
const statusText = document.getElementById('status-text');
const debugInfo = document.getElementById('debug-info');

// Generate room code
const roomCode = Math.random().toString(36).substr(2, 4).toUpperCase();
document.getElementById('room-code').textContent = roomCode;

// BroadcastChannel for same-device/same-browser communication
let bc = null;
try { bc = new BroadcastChannel('icedash_' + roomCode); } catch(e) {}

// Settings
let darkThresh = 60, minSize = 400, smoothing = 5;
let smoothX = 0.5, smoothY = 0.5;

document.getElementById('darkThresh').oninput = e => {
  darkThresh = +e.target.value;
  document.getElementById('darkVal').textContent = darkThresh;
};
document.getElementById('minSize').oninput = e => {
  minSize = +e.target.value;
  document.getElementById('sizeVal').textContent = minSize;
};
document.getElementById('smoothing').oninput = e => {
  smoothing = +e.target.value;
  document.getElementById('smoothVal').textContent = smoothing;
};

// Hidden processing canvas
const procCanvas = document.createElement('canvas');
const pctx = procCanvas.getContext('2d', { willReadFrequently: true });
const PROC_W = 160, PROC_H = 120;
procCanvas.width = PROC_W;
procCanvas.height = PROC_H;

let running = false;
let lastX = null, lastY = null;

async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 480 } }
    });
    video.srcObject = stream;
    await video.play();

    overlay.width = video.videoWidth || 640;
    overlay.height = video.videoHeight || 480;

    statusDot.className = 'connected';
    statusText.textContent = '카메라 연결됨 — 퍽을 화면에 비춰주세요';
    document.getElementById('start-btn').textContent = '✅ 추적 중...';
    document.getElementById('start-btn').style.background = '#00aa66';
    running = true;
    requestAnimationFrame(trackLoop);
  } catch(err) {
    statusText.textContent = '카메라 접근 실패: ' + err.message;
    statusDot.style.background = '#ff4444';
  }
}

function trackLoop() {
  if (!running) return;
  if (video.readyState < 2) { requestAnimationFrame(trackLoop); return; }

  // Draw video to small processing canvas (mirrored to match display)
  pctx.save();
  pctx.translate(PROC_W, 0);
  pctx.scale(-1, 1);
  pctx.drawImage(video, 0, 0, PROC_W, PROC_H);
  pctx.restore();

  const imageData = pctx.getImageData(0, 0, PROC_W, PROC_H);
  const data = imageData.data;

  // Find dark pixels (puck)
  let sumX = 0, sumY = 0, count = 0;
  for (let y = 0; y < PROC_H; y++) {
    for (let x = 0; x < PROC_W; x++) {
      const i = (y * PROC_W + x) * 4;
      const r = data[i], g = data[i+1], b = data[i+2];
      const brightness = (r + g + b) / 3;
      const saturation = Math.max(r, g, b) - Math.min(r, g, b);
      // Dark AND not too colorful (to avoid colored objects)
      if (brightness < darkThresh && saturation < 40) {
        sumX += x; sumY += y; count++;
      }
    }
  }

  const OW = overlay.width, OH = overlay.height;
  octx.clearRect(0, 0, OW, OH);

  if (count > minSize) {
    const rawX = (sumX / count) / PROC_W;
    const rawY = (sumY / count) / PROC_H;

    const alpha = smoothing / 20;
    smoothX = smoothX * (1 - alpha) + rawX * alpha;
    smoothY = smoothY * (1 - alpha) + rawY * alpha;

    // Draw detection overlay
    const px = smoothX * OW;
    const py = smoothY * OH;

    // Crosshair
    octx.strokeStyle = 'rgba(0,255,136,0.9)';
    octx.lineWidth = 2;
    octx.beginPath();
    octx.moveTo(px - 30, py); octx.lineTo(px + 30, py);
    octx.moveTo(px, py - 30); octx.lineTo(px, py + 30);
    octx.stroke();

    // Circle
    octx.strokeStyle = 'rgba(0,255,136,0.7)';
    octx.lineWidth = 3;
    octx.beginPath();
    octx.arc(px, py, 24, 0, Math.PI * 2);
    octx.stroke();

    // Glow fill
    const grd = octx.createRadialGradient(px, py, 0, px, py, 24);
    grd.addColorStop(0, 'rgba(0,255,136,0.25)');
    grd.addColorStop(1, 'rgba(0,255,136,0)');
    octx.fillStyle = grd;
    octx.beginPath();
    octx.arc(px, py, 24, 0, Math.PI * 2);
    octx.fill();

    // Label
    octx.fillStyle = 'rgba(0,255,136,0.9)';
    octx.font = 'bold 12px sans-serif';
    octx.fillText('퍽 감지됨', px + 28, py - 8);

    // Send position
    const payload = { x: smoothX, y: smoothY, room: roomCode, ts: Date.now() };
    if (bc) bc.postMessage(payload);

    // Also store in localStorage for cross-tab
    try { localStorage.setItem('icedash_pos', JSON.stringify(payload)); } catch(e) {}

    statusDot.className = 'tracking';
    statusText.textContent = `퍽 추적 중 — X: ${(smoothX * 100).toFixed(0)}%`;
    debugInfo.textContent = `퍽 X: ${(smoothX * 100).toFixed(1)}% | Y: ${(smoothY * 100).toFixed(1)}% | 픽셀: ${count}`;
    lastX = smoothX; lastY = smoothY;
  } else {
    // No puck detected
    statusDot.className = 'connected';
    if (lastX !== null) {
      statusText.textContent = '퍽을 찾는 중... 카메라를 퍽 위로';
    }
    debugInfo.textContent = `감지된 어두운 픽셀: ${count} (최소: ${minSize})`;
  }

  requestAnimationFrame(trackLoop);
}
</script>
</body>
</html>
