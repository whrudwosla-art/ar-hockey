<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ICE DASH — 퍽 추적기</title>

<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

body {
  background:#000;
  font-family:'Helvetica Neue',sans-serif;
  overflow:hidden;
  touch-action:none;
}

/* ===== VIDEO / CANVAS ===== */
#vid, #oc {
  position:fixed; inset:0;
  width:100vw; height:100vh;
  object-fit:cover;
  transform:scaleX(-1);
}
#vid { z-index:0; }
#oc  { z-index:1; }

/* ===== UI ===== */
#top-bar {
  position:fixed; top:0; left:0; right:0;
  display:flex; align-items:center; gap:10px;
  padding:10px 14px;
  background:rgba(8,25,46,0.88);
  z-index:10;
}
#sdot {
  width:10px; height:10px; border-radius:50%;
  background:#ff4444;
}
#sdot.ready { background:#ffcc00; box-shadow:0 0 6px #ffcc00; }
#sdot.found { background:#00ff88; box-shadow:0 0 8px #00ff88; animation:blink .6s infinite alternate; }
@keyframes blink { to{opacity:.3;} }
#stxt { flex:1; color:white; font-size:13px; }
#room-pill {
  background:rgba(0,204,255,0.15);
  border:1px solid rgba(0,204,255,0.4);
  border-radius:20px;
  padding:4px 10px;
  font-weight:800; letter-spacing:3px;
  color:#00ccff;
  font-size:12px;
}

/* ===== CAMERA PANEL ===== */
#cam-panel {
  position:fixed; inset:0;
  background:rgba(8,25,46,0.95);
  z-index:20;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:16px;
}
#cam-panel h2 { color:#00ccff; letter-spacing:3px; }
#cam-panel p { color:#99bbcc; font-size:14px; text-align:center; line-height:1.6; }

.btn {
  border:none; border-radius:10px;
  padding:12px 22px;
  font-size:15px; font-weight:700;
  cursor:pointer;
}
.btn-blue { background:#00ccff; color:#08192e; }

/* ===== CONF BAR ===== */
#conf {
  position:fixed; bottom:12px; left:14px; right:14px;
  height:8px; background:#0a1e36;
  border-radius:4px; overflow:hidden;
  z-index:10;
}
#conf-fill {
  height:100%; width:0%;
  background:#00ff88;
  transition:width .1s;
}
</style>
</head>

<body>

<video id="vid" autoplay playsinline muted></video>
<canvas id="oc"></canvas>

<div id="top-bar">
  <div id="sdot"></div>
  <div id="stxt">대기 중…</div>
  <div id="room-pill">----</div>
</div>

<div id="conf"><div id="conf-fill"></div></div>

<!-- CAMERA START PANEL -->
<div id="cam-panel">
  <h2>📷 CAMERA</h2>
  <p>
    카메라를 연결해<br>
    퍽을 추적합니다
  </p>
  <button class="btn btn-blue" onclick="startCameraFromButton()">
    카메라 연결
  </button>
</div>

<script>
/* =====================================================
   ROOM / OUTPUT
===================================================== */
const roomCode = Math.random().toString(36).substr(2,4).toUpperCase();
room-pill.textContent = roomCode;

function sendPos(x,y,conf){
  const p = { x,y,confidence:conf,ts:Date.now(),room:roomCode };
  try {
    if (!window._bc)
      window._bc = new BroadcastChannel('icedash_' + roomCode);
    _bc.postMessage(p);
  } catch(e){}
  try {
    localStorage.setItem('icedash_pos', JSON.stringify(p));
  } catch(e){}
}

   CANVAS SETUP
