
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ICE DASH — 퍽 추적기</title>

<style>
/* ===== 기본 레이아웃 ===== */
*, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
body {
  background:#000; display:flex; justify-content:center; align-items:center;
  min-height:100vh; font-family:'Helvetica Neue',sans-serif;
  overflow:hidden; touch-action:none;
}

/* ===== Video / Canvas ===== */
#vid, #oc {
  position:fixed; top:0; left:0;
  width:100vw; height:100vh;
  object-fit:cover;
  transform:scaleX(-1); /* MIRROR DISPLAY */
}
#vid { z-index:0; }
#oc  { z-index:1; }

/* ===== UI ===== */
#ui { position:fixed; top:0; left:0; right:0; z-index:10; pointer-events:none; }
#top-bar {
  display:flex; gap:10px; align-items:center;
  background:rgba(8,25,46,.88); padding:10px 16px;
  pointer-events:auto;
}
#sdot {
  width:11px; height:11px; border-radius:50%;
  background:#ff4444; transition:.3s;
}
#sdot.ready { background:#ffcc00; box-shadow:0 0 8px #ffcc00; }
#sdot.found { background:#00ff88; box-shadow:0 0 10px #00ff88; animation:blink .5s infinite alternate; }
@keyframes blink { to{opacity:.3;} }
#stxt { flex:1; color:#fff; font-size:13px; }
#room-pill {
  padding:4px 12px; border-radius:20px;
  border:1px solid #00ccff66;
  color:#00ccff; font-weight:800; letter-spacing:3px;
}

#bottom-bar {
  position:fixed; bottom:0; left:0; right:0;
  display:flex; gap:8px; align-items:center;
  background:rgba(8,25,46,.88);
  padding:10px 14px; z-index:10;
}

.btn { border:none; border-radius:8px; padding:9px 14px; font-weight:700; font-size:13px; }
.btn-red{background:#ff3c3c40;color:#ff8888}
.btn-gray{background:#ffffff20;color:#aabbcc}

.conf-bg{background:#0a1e36;height:8px;border-radius:4px;overflow:hidden}
.conf-fill{height:100%;width:0%;transition:.1s}
#puck-conf{background:#00ff88}

#dbg-canvas {
  position:fixed; bottom:60px; left:0;
  width:160px; height:120px;
  border:1px solid #00ccff;
  display:none; z-index:20;
  image-rendering:pixelated;
}
</style>
</head>

<body>

<video id="vid" autoplay playsinline muted></video>
<canvas id="oc"></canvas>
<canvas id="dbg-canvas"></canvas>

<div id="ui">
  <div id="top-bar">
    <div id="sdot"></div>
    <div id="stxt">카메라 대기 중…</div>
    <div id="room-pill">----</div>
  </div>
</div>

<div id="bottom-bar">
  <button class="btn btn-red" onclick="resetZone()">영역 재설정</button>
  <div style="flex:1">
    <div style="font-size:10px;color:#556677">퍽 감지</div>
    <div class="conf-bg"><div class="conf-fill" id="puck-conf"></div></div>
  </div>
  <input type="range" id="sl-dark" min="15" max="100" value="45">
  <button class="btn btn-gray" onclick="toggleDbg()">디버그</button>
</div>

<script type="module">
import { initializeApp, deleteApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

/* =====================================================
   ROOM
===================================================== */
const roomCode = Math.random().toString(36).substr(2,4).toUpperCase();
room-pill.textContent = roomCode;

/* =====================================================
   CAMERA
===================================================== */
const vid = document.getElementById('vid');
const oc  = document.getElementById('oc');
const octx= oc.getContext('2d');
const dbg = document.getElementById('dbg-canvas');
const dctx= dbg.getContext('2d');

/* user-gesture play (iOS safety) */
oc.addEventListener('pointerdown', ()=> vid.paused && vid.play(), { once:true });

async function startCam(){
  const s = await navigator.mediaDevices.getUserMedia({
    video:{ facingMode:'environment', width:{ideal:1920}, height:{ideal:1080} }
  });
  vid.srcObject = s;
  await vid.play();

  function resize(){
    oc.width=innerWidth; oc.height=innerHeight;
  }
  resize(); addEventListener('resize',resize);
  initProcessing();
  requestAnimationFrame(loop);
}

/* =====================================================
   PROCESSING CANVAS (REAL ASPECT)
===================================================== */
let pc, pctx, PW=240, PH=135;
function initProcessing(){
  const vw = vid.videoWidth;
  const vh = vid.videoHeight;
  PH = Math.round(PW * vh / vw);   // ✅ real ratio
  pc = document.createElement('canvas');
  pc.width = PW; pc.height = PH;
  pctx = pc.getContext('2d',{willReadFrequently:true});
  dbg.width = PW; dbg.height = PH;
}

/* =====================================================
   ZONE
===================================================== */
let zone=null, taps=[];
function resetZone(){
  zone=null; taps=[];
}

/* =====================================================
   LOOP
===================================================== */
let frame=0, darkAvg=180;
function loop(){
  /* MIRROR PIPELINE:
     CAMERA → MIRROR → PROCESS → UNMIRROR DISPLAY */
  pctx.save();
  pctx.translate(PW,0); pctx.scale(-1,1);
  pctx.drawImage(vid,0,0,PW,PH);
  pctx.restore();

  if(++frame%3===0){ // ✅ CPU save
    const img=pctx.getImageData(0,0,PW,PH).data;
    let s=0,n=0;
    for(let i=0;i<img.length;i+=20){
      s+=img[i]*0.299+img[i+1]*0.587+img[i+2]*0.114; n++;
    }
    darkAvg=s/n;
  }

  requestAnimationFrame(loop);
}

/* =====================================================
   VISIBILITY
===================================================== */
document.addEventListener('visibilitychange',()=>{
  if(document.hidden) vid.pause();
  else vid.play();
});

/* =====================================================
   DEBUG
===================================================== */
let dbgOn=false;
function toggleDbg(){
  dbgOn=!dbgOn;
  dbg.style.display=dbgOn?'block':'none';
}

/* =====================================================
   START
===================================================== */
startCam();
</script>

</body>
</html>
