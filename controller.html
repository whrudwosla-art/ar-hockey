<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ICE DASH — 퍽 추적기 v3</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #08192e; color: white;
    font-family: 'Helvetica Neue', sans-serif;
    display: flex; flex-direction: column; align-items: center;
    min-height: 100vh; padding: 12px; gap: 10px;
  }
  h1 { font-size: 20px; letter-spacing: 3px; color: #00ccff; margin-top: 4px; font-weight: 800; }

  #status-bar {
    width: 100%; max-width: 440px; background: #0e2540;
    border-radius: 12px; padding: 10px 16px;
    display: flex; align-items: center; gap: 10px;
  }
  #sdot { width: 11px; height: 11px; border-radius: 50%; background: #ff4444; flex-shrink: 0; transition: background 0.3s; }
  #sdot.on    { background: #00ccff; box-shadow: 0 0 8px #00ccff; animation: blink .7s infinite alternate; }
  #sdot.found { background: #00ff88; box-shadow: 0 0 10px #00ff88; }
  @keyframes blink { to { opacity: .3; } }
  #stxt { flex: 1; color: #99bbcc; font-size: 13px; line-height: 1.4; }

  #canvas-wrap {
    position: relative; width: 100%; max-width: 440px;
    border-radius: 14px; overflow: hidden; border: 2px solid #1a3a5c; background: #000;
  }
  #vid { width: 100%; display: block; transform: scaleX(-1); }
  #oc  { position: absolute; inset: 0; width: 100%; height: 100%; transform: scaleX(-1); pointer-events: none; }

  /* Debug canvas - shows processing view */
  #dbg { width: 100%; max-width: 440px; border-radius: 10px; border: 1px solid #1a3a5c; display: none; image-rendering: pixelated; }
  #dbg.show { display: block; }

  #conf-wrap { width: 100%; max-width: 440px; background: #0e2540; border-radius: 12px; padding: 12px 16px; }
  .bar-lbl { font-size: 11px; color: #556677; margin-bottom: 6px; letter-spacing: 1px; text-transform: uppercase; }
  .bar-bg { background: #0a1e36; border-radius: 6px; height: 12px; overflow: hidden; margin-bottom: 6px; }
  .bar-fill { height: 100%; width: 0%; border-radius: 6px; transition: width .08s, background .2s; }
  #board-fill { background: #ffcc00; }
  #puck-fill  { background: #00ff88; }

  #controls {
    width: 100%; max-width: 440px; background: #0e2540;
    border-radius: 12px; padding: 14px 16px; display: flex; flex-direction: column; gap: 10px;
  }
  .sec { font-size: 11px; letter-spacing: 2px; color: #445566; text-transform: uppercase; margin-top: 4px; }
  .row { display: flex; align-items: center; gap: 10px; font-size: 13px; color: #99bbcc; }
  .row label { min-width: 108px; }
  input[type=range] { flex: 1; accent-color: #00ccff; }
  .val { min-width: 40px; text-align: right; color: white; font-weight: 700; font-size: 13px; }

  #fb-wrap {
    width: 100%; max-width: 440px; background: #0e2540;
    border-radius: 12px; padding: 14px 16px; display: flex; flex-direction: column; gap: 8px;
  }
  #fb-url {
    background: #071628; border: 1px solid #1a3a5c; color: #00ccff;
    border-radius: 8px; padding: 8px 12px; font-size: 13px; font-family: monospace; width: 100%;
  }
  #fb-url::placeholder { color: #223344; }
  #fb-url.ok { border-color: #00aa66; color: #00ff88; }

  #room-wrap { width: 100%; max-width: 440px; background: #0e2540; border-radius: 12px; padding: 12px 16px; text-align: center; }
  #room-lbl  { font-size: 11px; color: #334455; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; }
  #room-code { font-size: 38px; letter-spacing: 8px; color: #00ccff; font-weight: 900; }

  .big-btn {
    font-size: 18px; font-weight: 800; letter-spacing: 2px; color: #08192e;
    background: #00ccff; border: none; border-radius: 10px; padding: 14px;
    width: 100%; max-width: 440px; cursor: pointer;
  }
  .sm-btn {
    font-size: 12px; color: #445566; background: none;
    border: 1px solid #1a3a5c; border-radius: 8px;
    padding: 7px 16px; cursor: pointer; width: 100%; max-width: 440px;
  }
  #dtxt { font-size: 11px; color: #334455; text-align: center; line-height: 1.6; }
</style>
</head>
<body>

<h1>🏒 퍽 추적기 v3</h1>

<div id="status-bar">
  <div id="sdot"></div>
  <div id="stxt">카메라 시작을 눌러주세요</div>
</div>

<div id="canvas-wrap">
  <video id="vid" autoplay playsinline muted></video>
  <canvas id="oc"></canvas>
</div>

<!-- Debug: shows what algorithm sees -->
<canvas id="dbg"></canvas>

<div id="conf-wrap">
  <div class="bar-lbl">흰 보드 감지</div>
  <div class="bar-bg"><div class="bar-fill" id="board-fill"></div></div>
  <div class="bar-lbl">퍽 감지 신뢰도</div>
  <div class="bar-bg"><div class="bar-fill" id="puck-fill"></div></div>
</div>

<div id="controls">
  <div class="sec">① 흰 보드 감지 설정</div>
  <div class="row">
    <label>보드 밝기 기준</label>
    <input type="range" id="sl-wb" min="100" max="240" value="180">
    <span class="val" id="v-wb">180</span>
  </div>
  <div class="row">
    <label>보드 최소 면적%</label>
    <input type="range" id="sl-wmin" min="5" max="60" value="15">
    <span class="val" id="v-wmin">15</span>
  </div>

  <div class="sec">② 퍽 감지 설정 (보드 안에서만)</div>
  <div class="row">
    <label>퍽 어두움 기준</label>
    <input type="range" id="sl-dark" min="10" max="120" value="55">
    <span class="val" id="v-dark">55</span>
  </div>
  <div class="row">
    <label>퍽 최소 픽셀</label>
    <input type="range" id="sl-pmin" min="5" max="500" step="5" value="20">
    <span class="val" id="v-pmin">20</span>
  </div>
  <div class="row">
    <label>퍽 최대 픽셀</label>
    <input type="range" id="sl-pmax" min="50" max="5000" step="50" value="800">
    <span class="val" id="v-pmax">800</span>
  </div>
  <div class="row">
    <label>부드러움</label>
    <input type="range" id="sl-sm" min="1" max="20" value="8">
    <span class="val" id="v-sm">8</span>
  </div>
</div>

<div id="fb-wrap">
  <div class="sec">Firebase DB URL</div>
  <input id="fb-url" type="url" placeholder="https://your-app-default-rtdb.firebaseio.com">
  <div style="font-size:11px;color:#334455">입력 후 엔터 — 자동저장</div>
</div>

<div id="room-wrap">
  <div id="room-lbl">연결 코드</div>
  <div id="room-code">----</div>
</div>

<button class="big-btn" onclick="startCam()">📷 카메라 시작</button>
<button class="sm-btn"  onclick="toggleDbg()">🔍 디버그 뷰 켜기/끄기</button>
<div id="dtxt">대기 중...</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, set } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

// ── Room code ──
const roomCode = Math.random().toString(36).substr(2,4).toUpperCase();
document.getElementById('room-code').textContent = roomCode;

// ── Firebase ──
let dbRef = null, fbApp = null;
const fbInput = document.getElementById('fb-url');
const savedUrl = localStorage.getItem('fb_url') || '';
if (savedUrl) { fbInput.value = savedUrl; initFb(savedUrl); }
fbInput.addEventListener('change', () => { const u = fbInput.value.trim(); localStorage.setItem('fb_url', u); initFb(u); });

function initFb(url) {
  if (!url || !url.includes('firebaseio.com') || fbApp) return;
  try {
    fbApp = initializeApp({ databaseURL: url }, 'icedash');
    dbRef = ref(getDatabase(fbApp), 'puck/' + roomCode);
    fbInput.classList.add('ok');
  } catch(e) { console.warn(e); }
}

function sendPos(x, y, conf) {
  const p = { x, y, confidence: conf, ts: Date.now(), room: roomCode };
  if (dbRef) set(dbRef, p).catch(()=>{});
  try {
    if (!window._bc) window._bc = new BroadcastChannel('icedash_' + roomCode);
    window._bc.postMessage(p);
  } catch(e) {}
  try { localStorage.setItem('icedash_pos', JSON.stringify(p)); } catch(e) {}
}

// ── Sliders ──
const S = {};
['wb','wmin','dark','pmin','pmax','sm'].forEach(k => {
  const el = document.getElementById('sl-'+k);
  const vEl = document.getElementById('v-'+k);
  S[k] = { el, vEl, get v() { return +el.value; } };
  el.addEventListener('input', () => { vEl.textContent = el.value; });
});

// ── DOM ──
const vid  = document.getElementById('vid');
const oc   = document.getElementById('oc');
const octx = oc.getContext('2d');
const dbgCanvas = document.getElementById('dbg');
const dbgCtx    = dbgCanvas.getContext('2d');
const sdot = document.getElementById('sdot');
const stxt = document.getElementById('stxt');
const boardFill = document.getElementById('board-fill');
const puckFill  = document.getElementById('puck-fill');
const dtxt = document.getElementById('dtxt');

// Low-res processing canvas
const PW = 160, PH = 120;
const pc   = document.createElement('canvas');
const pctx = pc.getContext('2d', { willReadFrequently: true });
pc.width = PW; pc.height = PH;

let running = false, dbgOn = false;
let smoothX = 0.5, smoothY = 0.5;
let noDetect = 0;

// Board bounding box (found from white detection)
let boardX0 = 0, boardY0 = 0, boardX1 = PW, boardY1 = PH;
let boardFound = false;

window.toggleDbg = () => {
  dbgOn = !dbgOn;
  dbgCanvas.classList.toggle('show', dbgOn);
};

window.startCam = async () => {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 }, frameRate: { ideal: 30 } }
    });
    vid.srcObject = stream;
    await vid.play();
    oc.width  = vid.videoWidth  || 1280;
    oc.height = vid.videoHeight || 720;
    dbgCanvas.width = PW; dbgCanvas.height = PH;
    sdot.className = 'on';
    stxt.textContent = '카메라 켜짐 — 흰 보드가 화면에 보이게 해주세요';
    document.getElementById('big-btn') && (document.querySelector('.big-btn').textContent = '✅ 추적 중...');
    document.querySelector('.big-btn').style.background = '#00aa66';
    running = true;
    requestAnimationFrame(loop);
  } catch(e) {
    stxt.textContent = '카메라 오류: ' + e.message;
  }
};

function loop() {
  if (!running || vid.readyState < 2) { requestAnimationFrame(loop); return; }

  // Draw mirrored video to low-res canvas
  pctx.save();
  pctx.translate(PW, 0); pctx.scale(-1, 1);
  pctx.drawImage(vid, 0, 0, PW, PH);
  pctx.restore();

  const imgData = pctx.getImageData(0, 0, PW, PH);
  const d = imgData.data;

  const wbThresh = S.wb.v;   // brightness threshold for "white board"
  const darkThresh = S.dark.v; // brightness threshold for "dark puck"

  // ── STEP 1: Find white board ──
  // Mark pixels that are very bright (white board surface)
  const whiteMask = new Uint8Array(PW * PH);
  let whiteCount = 0;
  let wxMin = PW, wxMax = 0, wyMin = PH, wyMax = 0;

  for (let y = 0; y < PH; y++) {
    for (let x = 0; x < PW; x++) {
      const i = (y * PW + x) * 4;
      const r = d[i], g = d[i+1], b = d[i+2];
      const lum = r * 0.299 + g * 0.587 + b * 0.114;
      const sat = Math.max(r,g,b) - Math.min(r,g,b);
      // White: bright AND low saturation (not colorful)
      if (lum > wbThresh && sat < 40) {
        whiteMask[y * PW + x] = 1;
        whiteCount++;
        if (x < wxMin) wxMin = x; if (x > wxMax) wxMax = x;
        if (y < wyMin) wyMin = y; if (y > wyMax) wyMax = y;
      }
    }
  }

  const whiteRatio = whiteCount / (PW * PH);
  const wminRatio  = S.wmin.v / 100;
  boardFound = whiteRatio >= wminRatio;

  boardFill.style.width = Math.round(whiteRatio * 100) + '%';
  boardFill.style.background = boardFound ? '#ffcc00' : '#ff4444';

  // Use board bounding box with small padding
  if (boardFound) {
    const pad = 2;
    boardX0 = Math.max(0, wxMin - pad);
    boardY0 = Math.max(0, wyMin - pad);
    boardX1 = Math.min(PW, wxMax + pad);
    boardY1 = Math.min(PH, wyMax + pad);
  }

  // ── STEP 2: Find dark puck INSIDE board only ──
  let sumX = 0, sumY = 0, puckCount = 0;
  const puckMask = new Uint8Array(PW * PH);

  const searchX0 = boardFound ? boardX0 : 0;
  const searchY0 = boardFound ? boardY0 : 0;
  const searchX1 = boardFound ? boardX1 : PW;
  const searchY1 = boardFound ? boardY1 : PH;

  for (let y = searchY0; y < searchY1; y++) {
    for (let x = searchX0; x < searchX1; x++) {
      const i = (y * PW + x) * 4;
      const r = d[i], g = d[i+1], b = d[i+2];
      const lum = r * 0.299 + g * 0.587 + b * 0.114;
      const sat = Math.max(r,g,b) - Math.min(r,g,b);
      // Dark AND low saturation = black puck
      if (lum < darkThresh && sat < 50) {
        puckMask[y * PW + x] = 1;
        sumX += x; sumY += y; puckCount++;
      }
    }
  }

  // ── Debug view ──
  if (dbgOn) {
    const di = dbgCtx.createImageData(PW, PH);
    for (let p = 0; p < PW * PH; p++) {
      let r = 40, g = 50, b = 60; // dark background
      if (whiteMask[p]) { r = 220; g = 220; b = 200; } // white board = light yellow
      if (puckMask[p])  { r = 0;   g = 220; b = 255; } // puck = cyan
      di.data[p*4]   = r;
      di.data[p*4+1] = g;
      di.data[p*4+2] = b;
      di.data[p*4+3] = 255;
    }
    dbgCtx.putImageData(di, 0, 0);
    // Draw board bounding box
    if (boardFound) {
      dbgCtx.strokeStyle = '#ffcc00';
      dbgCtx.lineWidth = 1.5;
      dbgCtx.strokeRect(boardX0, boardY0, boardX1-boardX0, boardY1-boardY0);
    }
  }

  // ── STEP 3: Output ──
  const OW = oc.width, OH = oc.height;
  octx.clearRect(0, 0, OW, OH);

  // Draw board outline on video overlay
  if (boardFound) {
    const bx = (boardX0/PW)*OW, by = (boardY0/PH)*OH;
    const bw = ((boardX1-boardX0)/PW)*OW, bh = ((boardY1-boardY0)/PH)*OH;
    octx.strokeStyle = 'rgba(255,200,0,0.5)';
    octx.lineWidth = 2;
    octx.setLineDash([8,6]);
    octx.strokeRect(bx, by, bw, bh);
    octx.setLineDash([]);
  }

  const pmin = S.pmin.v, pmax = S.pmax.v;

  if (puckCount >= pmin && puckCount <= pmax) {
    const rawX = (sumX / puckCount - searchX0) / (searchX1 - searchX0);
    const rawY = (sumY / puckCount - searchY0) / (searchY1 - searchY0);

    const alpha = S.sm.v / 100;
    smoothX = smoothX * (1 - alpha) + rawX * alpha;
    smoothY = smoothY * (1 - alpha) + rawY * alpha;

    const clampX = Math.max(0, Math.min(1, smoothX));
    const clampY = Math.max(0, Math.min(1, smoothY));

    // Confidence based on pixel count fitting expected range
    const ideal = (pmin + pmax) / 2;
    const conf  = Math.max(0, Math.min(1, 1 - Math.abs(puckCount - ideal) / ideal));
    const confPct = Math.round(conf * 100);

    puckFill.style.width = confPct + '%';
    puckFill.style.background = confPct > 60 ? '#00ff88' : confPct > 30 ? '#ffcc00' : '#ff4444';

    // Map puck position within board bounds to screen coords
    const px = (boardX0/PW + (clampX * (boardX1-boardX0)/PW)) * OW;
    const py = (boardY0/PH + (clampY * (boardY1-boardY0)/PH)) * OH;
    const estR = Math.max(12, Math.sqrt(puckCount / Math.PI) * (OW / PW));

    // Puck circle
    octx.strokeStyle = '#00ff88';
    octx.lineWidth = 3;
    octx.beginPath(); octx.arc(px, py, estR, 0, Math.PI*2); octx.stroke();

    // Glow
    octx.strokeStyle = `rgba(0,255,136,${0.2 + conf * 0.5})`;
    octx.lineWidth = 4;
    octx.beginPath(); octx.arc(px, py, estR + 16, 0, Math.PI*2); octx.stroke();

    // Crosshair
    const gap = estR + 4, arm = estR + 28;
    octx.strokeStyle = 'rgba(0,255,136,0.9)';
    octx.lineWidth = 1.5;
    [[px-arm,py,px-gap,py],[px+gap,py,px+arm,py],[px,py-arm,px,py-gap],[px,py+gap,px,py+arm]]
      .forEach(([x1,y1,x2,y2]) => { octx.beginPath(); octx.moveTo(x1,y1); octx.lineTo(x2,y2); octx.stroke(); });

    // Label
    octx.fillStyle = 'rgba(0,0,0,0.65)';
    octx.fillRect(px + estR + 6, py - 22, 124, 44);
    octx.fillStyle = '#00ff88';
    octx.font = 'bold 13px sans-serif';
    octx.fillText(`퍽 감지 ${confPct}%`, px + estR + 11, py - 5);
    octx.fillStyle = '#88ffcc';
    octx.font = '11px sans-serif';
    octx.fillText(`위치 X:${(clampX*100).toFixed(0)}% Y:${(clampY*100).toFixed(0)}%`, px + estR + 11, py + 12);

    // Send normalized position WITHIN board
    sendPos(clampX, clampY, conf);

    noDetect = 0;
    sdot.className = 'found';
    stxt.textContent = `퍽 추적 중 ✓  X: ${(clampX*100).toFixed(0)}%  신뢰도: ${confPct}%`;
    dtxt.textContent = `퍽픽셀: ${puckCount} | 보드: ${(whiteRatio*100).toFixed(0)}% | 임계: ${darkThresh}`;

  } else {
    noDetect++;
    puckFill.style.width = '0%';

    if (noDetect > 8) {
      sdot.className = boardFound ? 'on' : 'on';

      if (!boardFound) {
        stxt.textContent = `흰 보드가 안 보여요 — 보드를 화면 중앙에 크게 비춰주세요 (현재 흰색: ${(whiteRatio*100).toFixed(0)}%)`;
      } else if (puckCount < pmin) {
        stxt.textContent = `퍽을 못 찾아요 — "퍽 어두움 기준"↑ 또는 "퍽 최소 픽셀"↓ (현재: ${puckCount}px)`;
      } else {
        stxt.textContent = `감지 영역 너무 큼 (${puckCount}px) — "퍽 최대 픽셀"↑ 또는 "퍽 어두움 기준"↓`;
      }
      dtxt.textContent = `퍽픽셀: ${puckCount} | 보드감지: ${boardFound} | 보드면적: ${(whiteRatio*100).toFixed(1)}%`;
    }
  }

  requestAnimationFrame(loop);
}
</script>
</body>
</html>
