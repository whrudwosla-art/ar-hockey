<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
/>
<title>ICE DASH — 퍽 추적기</title>

<style>
*, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }

body {
  background:#000;
  font-family:system-ui, -apple-system, sans-serif;
  overflow:hidden;
  touch-action:none;
}

/* ===== VIDEO / CANVAS ===== */
#vid, #oc {
  position:fixed;
  inset:0;
  width:100vw;
  height:100vh;
  object-fit:cover;
  transform:scaleX(-1);
}
#vid { z-index:0; }
#oc  { z-index:1; }

/* ===== TOP BAR ===== */
#top-bar {
  position:fixed;
  top:0; left:0; right:0;
  z-index:10;
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px 14px;
  background:rgba(8,25,46,0.88);
}

#sdot {
  width:10px;
  height:10px;
  border-radius:50%;
  background:#ff4444;
}
#sdot.ready {
  background:#ffcc00;
  box-shadow:0 0 6px #ffcc00;
}
#sdot.found {
  background:#00ff88;
  box-shadow:0 0 8px #00ff88;
  animation:blink .6s infinite alternate;
}
@keyframes blink { to { opacity:.3; } }

#stxt {
  flex:1;
  font-size:13px;
  color:white;
}

#room-pill {
  padding:4px 10px;
  border-radius:18px;
  background:rgba(0,204,255,0.15);
  border:1px solid rgba(0,204,255,0.4);
  color:#00ccff;
  letter-spacing:3px;
  font-weight:800;
  font-size:12px;
}

/* ===== CAMERA START PANEL ===== */
#cam-panel {
  position:fixed;
  inset:0;
  z-index:20;
  background:rgba(8,25,46,0.95);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:18px;
}

#cam-panel h2 {
  color:#00ccff;
  letter-spacing:3px;
}

#cam-panel p {
  color:#99bbcc;
  font-size:14px;
  text-align:center;
  line-height:1.6;
}

.btn {
  border:none;
  border-radius:10px;
  padding:14px 26px;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
}
.btn-blue {
  background:#00ccff;
  color:#08192e;
}

/* ===== CONF BAR ===== */
#conf {
  position:fixed;
  left:14px;
  right:14px;
  bottom:12px;
  height:8px;
  background:#0a1e36;
  border-radius:4px;
  overflow:hidden;
  z-index:10;
}
#conf-fill {
  height:100%;
  width:0%;
  background:#00ff88;
  transition:width .1s;
}
</style>
</head>

<body>

<video id="vid" autoplay playsinline muted></video>
<canvas id="oc"></canvas>

<div id="top-bar">
  <div id="sdot"></div>
  <div id="stxt">대기 중</div>
  <div id="room-pill">----</div>
</div>

<div id="conf"><div id="conf-fill"></div></div>

<!-- CAMERA START -->
<div id="cam-panel">
  <h2>📷 CAMERA</h2>
  <p>
    버튼을 눌러 카메라를 연결하세요<br>
    (안드로이드에서는 HTTPS 필요)
  </p>
  <button class="btn btn-blue" onclick="startCameraFromButton()">
    카메라 연결
  </button>
</div>

<script>
/* =====================================================
   ROOM CODE (✅ 치명적 오류 수정됨)
===================================================== */
const roomCode = Math.random().toString(36).substr(2,4).toUpperCase();
const roomPill = document.getElementById('room-pill');
roomPill.textContent = roomCode;

/* =====================================================
   OUTPUT (GAME COMPATIBLE)
===================================================== */
function sendPos(x, y, confidence) {
  const payload = {
    x, y,
    confidence,
    ts: Date.now(),
    room: roomCode
  };

  try {
    if (!window._bc) {
      window._bc = new BroadcastChannel('icedash_' + roomCode);
    }
    window._bc.postMessage(payload);
  } catch(e) {}

  try {
    localStorage.setItem('icedash_pos', JSON.stringify(payload));
  } catch(e) {}
}

/* =====================================================
   CAMERA SETUP
===================================================== */
const vid   = document.getElementById('vid');
const oc    = document.getElementById('oc');
const octx  = oc.getContext('2d');
const sdot  = document.getElementById('sdot');
const stxt  = document.getElementById('stxt');
const confF = document.getElementById('conf-fill');

function resize() {
  oc.width = innerWidth;
  oc.height = innerHeight;
}
resize();
addEventListener('resize', resize);

/* =====================================================
   BUTTON → CAMERA START (✅ Android/iOS OK)
===================================================== */
async function startCameraFromButton() {
  document.getElementById('cam-panel').style.display = 'none';
  await startCam();
}

async function startCam() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: 'environment' },
        width:  { ideal: 1920 },
        height: { ideal: 1080 }
      }
    });

    vid.srcObject = stream;
    await vid.play();

    sdot.className = 'ready';
    stxt.textContent = '카메라 연결됨 — 퍽 추적 중';

    initProcessing();
    requestAnimationFrame(loop);

  } catch (e) {
    console.error(e);
    sdot.className = '';
    stxt.textContent = '카메라 오류: ' + e.name;
    alert(
      '카메라를 열 수 없습니다\n\n' +
      '오류: ' + e.name + '\n\n' +
      '✔ HTTPS 접속 여부를 확인하세요'
    );
  }
}

/* =====================================================
   PROCESSING (VERY SIMPLE DARK OBJECT TRACKER)
===================================================== */
const PW = 240;
let PH = 135;
let pc, pctx;

function initProcessing() {
  PH = Math.round(PW * vid.videoHeight / vid.videoWidth);
  pc = document.createElement('canvas');
  pc.width = PW;
  pc.height = PH;
  pctx = pc.getContext('2d', { willReadFrequently:true });
}

let smoothX = 0.5;
let smoothY = 0.5;

/* =====================================================
   MAIN LOOP
===================================================== */
function loop() {
  pctx.save();
  pctx.translate(PW, 0);
  pctx.scale(-1, 1);
  pctx.drawImage(vid, 0, 0, PW, PH);
  pctx.restore();

  const img = pctx.getImageData(0,0,PW,PH).data;
  let sx=0, sy=0, count=0;

  for (let i=0; i<img.length; i+=16) {
    const lum = img[i]*0.299 + img[i+1]*0.587 + img[i+2]*0.114;
    if (lum < 60) {
      const p = i/4;
      sx += p % PW;
      sy += Math.floor(p / PW);
      count++;
    }
  }

  if (count > 25) {
    const rx = (sx/count)/PW;
    const ry = (sy/count)/PH;
    smoothX = smoothX*0.85 + rx*0.15;
    smoothY = smoothY*0.85 + ry*0.15;

    const conf = Math.min(1, count / 400);
    sendPos(smoothX, smoothY, conf);

    confF.style.width = (conf*100).toFixed(0) + '%';
    sdot.className = 'found';
    stxt.textContent =
      `퍽 추적 중 — X ${(smoothX*100).toFixed(0)}% / 신뢰 ${(conf*100).toFixed(0)}%`;
  } else {
    confF.style.width = '0%';
  }

  requestAnimationFrame(loop);
}
</script>

</body>
</html>
