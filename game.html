<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICE DASH — 하키 런</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --accent: #00ccff; --bg: #08192e; }
  body {
    background: var(--bg); display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh; font-family: 'Noto Sans KR', sans-serif;
    overflow: hidden; user-select: none;
  }
  #header {
    display: flex; align-items: baseline; gap: 14px;
    margin-bottom: 8px; width: 100%; max-width: 520px; padding: 0 4px;
  }
  #title { font-family: 'Bebas Neue', cursive; font-size: 34px; letter-spacing: 4px; color: var(--accent); line-height: 1; }
  #score-display { font-family: 'Bebas Neue', cursive; font-size: 28px; color: white; letter-spacing: 2px; margin-left: auto; }
  #level-display { font-family: 'Bebas Neue', cursive; font-size: 20px; color: #88bbdd; letter-spacing: 2px; }
  #combo-display { font-family: 'Bebas Neue', cursive; font-size: 20px; color: #ffcc00; min-width: 90px; }

  /* Connection status bar */
  #conn-bar {
    width: 100%; max-width: 520px;
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 8px; padding: 7px 12px;
    background: rgba(14,37,64,0.8); border-radius: 10px;
    font-size: 12px; color: #99bbcc;
  }
  #conn-dot { width: 9px; height: 9px; border-radius: 50%; background: #ff4444; flex-shrink:0; transition: background .3s; }
  #conn-dot.live { background: #00ccff; box-shadow: 0 0 8px #00ccff; animation: cp .8s infinite alternate; }
  #conn-dot.puck { background: #00ff88; box-shadow: 0 0 8px #00ff88; }
  @keyframes cp { to { opacity:.3; } }
  #conn-txt { flex: 1; }
  #mode-badge {
    font-size: 11px; padding: 2px 10px; border-radius: 20px;
    background: rgba(0,204,255,0.15); color: #00ccff;
    border: 1px solid rgba(0,204,255,0.3); cursor: pointer;
  }
  #mode-badge.puck-mode { background: rgba(0,255,136,0.15); color: #00ff88; border-color: rgba(0,255,136,0.3); }

  #lives { display: flex; gap: 8px; margin-bottom: 8px; width: 100%; max-width: 520px; padding: 0 4px; }
  .life-dot { width: 14px; height: 14px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px rgba(0,204,255,.6); transition: background .2s; }
  .life-dot.lost { background: #223344; box-shadow: none; }

  #canvas-wrap {
    position: relative; border: 3px solid #1a3a5c; border-radius: 28px; overflow: hidden;
    box-shadow: 0 0 60px rgba(0,100,200,.4), 0 0 0 1px rgba(0,200,255,.15);
  }
  canvas { display: block; cursor: none; }

  #overlay {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(8,25,46,.88); backdrop-filter: blur(4px);
    border-radius: 26px; transition: opacity .3s;
  }
  #overlay.hidden { opacity: 0; pointer-events: none; }
  .ov-title { font-family: 'Bebas Neue', cursive; font-size: 46px; letter-spacing: 6px; color: var(--accent); margin-bottom: 8px; }
  .ov-sub { font-size: 14px; color: #99bbcc; margin-bottom: 24px; text-align: center; line-height: 1.9; }
  .final-score { font-family: 'Bebas Neue', cursive; font-size: 70px; color: white; letter-spacing: 4px; line-height: 1; margin-bottom: 4px; }
  .score-lbl { font-size: 12px; color: #667788; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 24px; }
  .btn {
    font-family: 'Bebas Neue', cursive; font-size: 22px; letter-spacing: 3px;
    color: #08192e; background: var(--accent); border: none; border-radius: 8px;
    padding: 13px 44px; cursor: pointer; box-shadow: 0 0 20px rgba(0,204,255,.4);
    transition: transform .15s, box-shadow .15s;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 0 32px rgba(0,204,255,.7); }
  #mouse-hint { margin-top: 14px; font-size: 12px; color: #334455; }
</style>
</head>
<body>

<div id="header">
  <div id="title">ICE DASH</div>
  <div id="combo-display"></div>
  <div id="level-display">LV 1</div>
  <div id="score-display">0</div>
</div>

<div id="conn-bar">
  <div id="conn-dot"></div>
  <div id="conn-txt">Firebase 연결 중...</div>
  <div id="mode-badge" onclick="toggleMode()">🖱️ 마우스 모드</div>
</div>

<div id="lives">
  <div class="life-dot" id="life0"></div>
  <div class="life-dot" id="life1"></div>
  <div class="life-dot" id="life2"></div>
</div>

<div id="canvas-wrap">
  <canvas id="gameCanvas"></canvas>
  <div id="overlay">
    <div class="ov-title" id="ov-title">ICE DASH</div>
    <div class="ov-sub" id="ov-sub">
      📱 스마트폰에서 <b>camera_tracker.html</b>을 열고<br>
      퍽을 흰 보드에 올려서 조종하세요!<br>
      <span style="color:#445566;font-size:12px">또는 마우스로도 플레이 가능</span>
    </div>
    <div class="final-score" id="ov-score" style="display:none"></div>
    <div class="score-lbl" id="ov-lbl" style="display:none">SCORE</div>
    <button class="btn" onclick="startGame()">시작하기</button>
    <div id="mouse-hint">🖱️ 마우스 / 🏒 퍽 — 우측 상단 배지로 전환</div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, onValue } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

// ── Firebase ──
const firebaseConfig = {
  apiKey: "AIzaSyDkLOUsbcGDTaW3nq3Egn8vJth2tFLf8-w",
  authDomain: "icedash-90566.firebaseapp.com",
  databaseURL: "https://icedash-90566-default-rtdb.firebaseio.com",
  projectId: "icedash-90566",
  storageBucket: "icedash-90566.firebasestorage.app",
  messagingSenderId: "639696103978",
  appId: "1:639696103978:web:9c19e8341ecdbb6f2e7153"
};
const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);
const ROOM = 'ICEDASH';

// ── Listen for puck position ──
let puckX = 0.5;
let lastPuckTs = 0;
let inputMode = 'mouse'; // 'mouse' | 'puck'

const connDot = document.getElementById('conn-dot');
const connTxt = document.getElementById('conn-txt');
const modeBadge = document.getElementById('mode-badge');

onValue(ref(db, 'puck/' + ROOM), snap => {
  const data = snap.val();
  if (!data) {
    connDot.className = 'live';
    connTxt.textContent = 'Firebase 연결됨 — 추적기 대기 중';
    return;
  }
  const age = Date.now() - (data.ts || 0);
  if (age < 2000) {
    puckX = Math.max(0, Math.min(1, data.x ?? 0.5));
    lastPuckTs = data.ts;
    connDot.className = 'puck';
    connTxt.textContent = `퍽 연결됨 ✓  X:${(puckX*100).toFixed(0)}%  신뢰:${Math.round((data.confidence||0)*100)}%`;
    if (inputMode !== 'puck') {
      inputMode = 'puck';
      modeBadge.textContent = '🏒 퍽 모드';
      modeBadge.className = 'puck-mode';
    }
  }
});

window.toggleMode = () => {
  if (inputMode === 'mouse') {
    inputMode = 'puck';
    modeBadge.textContent = '🏒 퍽 모드';
    modeBadge.className = 'puck-mode';
  } else {
    inputMode = 'mouse';
    modeBadge.textContent = '🖱️ 마우스 모드';
    modeBadge.className = '';
  }
};

// Periodically check staleness
setInterval(() => {
  if (lastPuckTs && Date.now() - lastPuckTs > 2000) {
    connDot.className = 'live';
    connTxt.textContent = '추적기 신호 없음 — 카메라 앱을 확인하세요';
  }
}, 1000);

connDot.className = 'live';
connTxt.textContent = 'Firebase 연결됨 — 추적기 대기 중';

// ── Canvas setup ──
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = Math.min(520, window.innerWidth - 24);
const H = Math.min(660, window.innerHeight - 180);
canvas.width = W; canvas.height = H;

// ── Mouse / touch input ──
let mouseX = W / 2, cursorX = W / 2, cursorY = H / 2;
canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouseX  = (e.clientX - r.left) * (W / r.width);
  cursorX = mouseX;
  cursorY = (e.clientY - r.top) * (H / r.height);
});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const r = canvas.getBoundingClientRect();
  mouseX = (e.touches[0].clientX - r.left) * (W / r.width);
}, { passive: false });

function getTargetX() {
  if (inputMode === 'puck' && Date.now() - lastPuckTs < 2000) {
    return puckX * W;
  }
  return mouseX;
}

// ── Game state ──
let state = 'idle';
let score = 0, lives = 3, level = 1, combo = 0, maxCombo = 0, frameCount = 0;
let animId;
let obstacles = [], bonuses = [], particles = [];
let rinkOffset = 0;

const LANES = 5, laneW = W / LANES;
const player = { x: W/2, y: H-80, r: 16, vx: 0, invincible: 0, trail: [] };

function speed() { return 3 + level * 0.8 + score * 0.0008; }
function laneCenter(i) { return laneW * i + laneW / 2; }

function spawnObstacle() {
  const types = ['player','cone','board'];
  const type = types[Math.floor(Math.random() * 3)];
  const lane = Math.floor(Math.random() * LANES);
  let w = 36, h = 36;
  if (type === 'cone')  { w = 22; h = 30; }
  if (type === 'board') { w = laneW * 1.4; h = 22; }
  obstacles.push({ x: laneCenter(lane) - w/2, y: -h-10, w, h, type, lane });
}

function spawnBonus() {
  bonuses.push({ x: laneCenter(Math.floor(Math.random()*LANES)), y: -20, r: 12, collected: false });
}

function addParticles(x, y, color, n=10) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2, s = 1.5 + Math.random() * 3;
    particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, r: 2+Math.random()*4, life: 1, color });
  }
}

function drawRink() {
  ctx.fillStyle = '#d8eeff'; ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = '#c0d8ee'; ctx.lineWidth = .5;
  for (let y = (rinkOffset%80)-80; y < H+80; y+=80) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
  ctx.strokeStyle = 'rgba(160,200,230,.5)'; ctx.lineWidth = 1; ctx.setLineDash([8,16]);
  for (let i = 1; i < LANES; i++) { ctx.beginPath(); ctx.moveTo(laneW*i,0); ctx.lineTo(laneW*i,H); ctx.stroke(); }
  ctx.setLineDash([]);
  const ry = ((rinkOffset*.5)%(H*2))-H;
  ctx.strokeStyle='rgba(220,50,60,.35)'; ctx.lineWidth=6; ctx.beginPath(); ctx.moveTo(0,ry); ctx.lineTo(W,ry); ctx.stroke();
  ['rgba(50,100,200,.25)'].forEach(() => {
    [-H*.3,H*.3].forEach(off => {
      const by=((rinkOffset*.5+off)%(H*2))-H;
      ctx.strokeStyle='rgba(50,100,200,.25)'; ctx.lineWidth=4;
      ctx.beginPath(); ctx.moveTo(0,by); ctx.lineTo(W,by); ctx.stroke();
    });
  });
  ctx.fillStyle='#336699'; ctx.fillRect(0,0,6,H); ctx.fillRect(W-6,0,6,H);
}

function drawPlayer() {
  const p = player;
  p.trail.forEach((t,i) => {
    ctx.strokeStyle=`rgba(100,180,255,${(i/p.trail.length)*.35})`;
    ctx.lineWidth=3; ctx.beginPath(); ctx.arc(t.x,t.y,p.r*.5,0,Math.PI*2); ctx.stroke();
  });
  if (p.invincible>0 && Math.floor(frameCount/4)%2===0) return;
  ctx.fillStyle='rgba(0,50,100,.18)';
  ctx.beginPath(); ctx.ellipse(p.x+3,p.y+4,p.r,p.r*.5,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#111';
  ctx.beginPath(); ctx.ellipse(p.x-6,p.y+p.r-2,8,4,-.3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(p.x+6,p.y+p.r-2,8,4,.3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#1a2a8a'; ctx.fillRect(p.x-10,p.y,8,14); ctx.fillRect(p.x+2,p.y,8,14);
  const g=ctx.createRadialGradient(p.x,p.y-6,2,p.x,p.y-6,16);
  g.addColorStop(0,'#2266ee'); g.addColorStop(1,'#0033aa');
  ctx.fillStyle=g; ctx.beginPath(); ctx.roundRect(p.x-13,p.y-20,26,22,5); ctx.fill();
  ctx.fillStyle='white'; ctx.font='bold 9px Bebas Neue,sans-serif';
  ctx.textAlign='center'; ctx.fillText('99',p.x,p.y-6);
  ctx.fillStyle='#1144bb'; ctx.beginPath(); ctx.arc(p.x,p.y-26,11,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#88aaff'; ctx.lineWidth=1.5;
  ctx.beginPath();
  [[p.x-7,p.y-21,p.x-5,p.y-17],[p.x-2,p.y-21,p.x-1,p.y-17],[p.x+3,p.y-21,p.x+3,p.y-17]]
    .forEach(([x1,y1,x2,y2])=>{ ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); });
  ctx.stroke();
  ctx.strokeStyle='#8B4513'; ctx.lineWidth=3; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(p.x+12,p.y-10); ctx.lineTo(p.x+22,p.y+8); ctx.stroke();
  ctx.strokeStyle='#555'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(p.x+19,p.y+4); ctx.lineTo(p.x+30,p.y+10); ctx.stroke();
  if (p.invincible>0) {
    ctx.strokeStyle=`rgba(0,255,255,${.5+Math.sin(frameCount*.3)*.3})`;
    ctx.lineWidth=2; ctx.beginPath(); ctx.arc(p.x,p.y-12,p.r+6,0,Math.PI*2); ctx.stroke();
  }
}

function drawObstacles() {
  obstacles.forEach(ob => {
    ctx.save(); ctx.translate(ob.x+ob.w/2, ob.y+ob.h/2);
    if (ob.type==='player') {
      ctx.fillStyle='#cc1122'; ctx.beginPath(); ctx.roundRect(-13,-10,26,18,4); ctx.fill();
      ctx.fillStyle='#880000'; ctx.beginPath(); ctx.arc(0,-18,10,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='white'; ctx.font='bold 8px Bebas Neue,sans-serif';
      ctx.textAlign='center'; ctx.fillText('44',0,-3);
    } else if (ob.type==='cone') {
      ctx.fillStyle='#ff8800'; ctx.beginPath();
      ctx.moveTo(0,-ob.h/2); ctx.lineTo(-ob.w/2,ob.h/2); ctx.lineTo(ob.w/2,ob.h/2); ctx.closePath(); ctx.fill();
      ctx.fillStyle='white'; ctx.fillRect(-ob.w/2,ob.h/4-3,ob.w,5);
    } else {
      const bg=ctx.createLinearGradient(-ob.w/2,0,ob.w/2,0);
      bg.addColorStop(0,'#1a3a66'); bg.addColorStop(.5,'#2255aa'); bg.addColorStop(1,'#1a3a66');
      ctx.fillStyle=bg; ctx.beginPath(); ctx.roundRect(-ob.w/2,-ob.h/2,ob.w,ob.h,4); ctx.fill();
      ctx.strokeStyle='#88aaff'; ctx.lineWidth=1; ctx.stroke();
    }
    ctx.restore();
  });
}

function drawBonuses() {
  bonuses.forEach(b => {
    if (b.collected) return;
    const pulse = Math.sin(frameCount*.1)*3;
    const gr=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r+10+pulse);
    gr.addColorStop(0,'rgba(255,220,0,.5)'); gr.addColorStop(1,'rgba(255,220,0,0)');
    ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(b.x,b.y,b.r+10+pulse,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ffcc00'; ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ff8800'; ctx.font='bold 12px sans-serif'; ctx.textAlign='center';
    ctx.fillText('★',b.x,b.y+4);
  });
}

function drawParticles() {
  particles.forEach(p => { ctx.globalAlpha=p.life; ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2); ctx.fill(); });
  ctx.globalAlpha=1;
}

function drawCursor() {
  if (state!=='playing' || inputMode==='puck') return;
  ctx.fillStyle='rgba(0,0,0,.7)'; ctx.strokeStyle='rgba(0,204,255,.8)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.ellipse(cursorX,cursorY,14,9,0,0,Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,.2)'; ctx.beginPath(); ctx.ellipse(cursorX-3,cursorY-2,5,3,-.4,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='rgba(0,200,255,.15)'; ctx.lineWidth=1; ctx.setLineDash([4,8]);
  ctx.beginPath(); ctx.moveTo(cursorX,cursorY); ctx.lineTo(player.x,player.y-20); ctx.stroke();
  ctx.setLineDash([]);
}

function checkCol(p, ob) {
  if (ob.type==='board') return p.x+p.r>ob.x&&p.x-p.r<ob.x+ob.w&&p.y+p.r>ob.y&&p.y-p.r<ob.y+ob.h;
  const cx=Math.max(ob.x,Math.min(p.x,ob.x+ob.w)), cy=Math.max(ob.y,Math.min(p.y,ob.y+ob.h));
  const dx=p.x-cx, dy=p.y-cy;
  return dx*dx+dy*dy<(p.r*.8)*(p.r*.8);
}

function hitPlayer() {
  if (player.invincible>0) return;
  lives--; player.invincible=90; combo=0; updateCombo();
  addParticles(player.x,player.y,'#ff4444',16); updateLives();
  if (lives<=0) { state='gameover'; showGameOver(); }
}

function updateLives() {
  for (let i=0;i<3;i++) document.getElementById('life'+i).classList.toggle('lost',i>=lives);
}
function updateCombo() {
  document.getElementById('combo-display').textContent = combo>=3?`${combo}× COMBO`:'';
}

let lastOb=0, lastBon=0;

function update() {
  frameCount++; rinkOffset+=speed();
  const tx = getTargetX();
  player.vx = (tx - player.x) * 0.12;
  player.x += player.vx;
  player.x = Math.max(player.r+6, Math.min(W-player.r-6, player.x));
  player.trail.push({x:player.x,y:player.y});
  if (player.trail.length>12) player.trail.shift();
  if (player.invincible>0) player.invincible--;

  const si = Math.max(40, 80-level*6);
  if (frameCount-lastOb>si)  { spawnObstacle(); lastOb=frameCount; }
  if (frameCount-lastBon>120){ spawnBonus();    lastBon=frameCount; }

  obstacles.forEach(ob=>{ob.y+=speed();});
  bonuses.forEach(b=>{b.y+=speed();});
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.1;p.life-=.03;});

  obstacles.forEach(ob=>{if(checkCol(player,ob))hitPlayer();});
  bonuses.forEach(b=>{
    if(b.collected)return;
    const dx=player.x-b.x,dy=player.y-b.y;
    if(dx*dx+dy*dy<(player.r+b.r)*(player.r+b.r)){
      b.collected=true; combo++; maxCombo=Math.max(maxCombo,combo);
      score+=50*(1+Math.floor(combo/3));
      addParticles(b.x,b.y,'#ffcc00',12); updateCombo();
    }
  });

  if(frameCount%6===0) score+=1+Math.floor(combo/3);
  const nl=Math.floor(score/500)+1;
  if(nl!==level){ level=nl; document.getElementById('level-display').textContent=`LV ${level}`; addParticles(player.x,player.y,'#00ccff',20); }

  obstacles=obstacles.filter(o=>o.y<H+60);
  bonuses=bonuses.filter(b=>b.y<H+40&&!b.collected);
  particles=particles.filter(p=>p.life>0);
  document.getElementById('score-display').textContent=Math.floor(score);
}

function draw() {
  ctx.clearRect(0,0,W,H);
  drawRink(); drawBonuses(); drawObstacles(); drawParticles(); drawPlayer(); drawCursor();
}

function loop() {
  if(state==='playing'){ update(); draw(); animId=requestAnimationFrame(loop); }
}

window.startGame = () => {
  score=0;lives=3;level=1;combo=0;frameCount=0;maxCombo=0;
  player.x=W/2;player.vx=0;player.invincible=0;player.trail=[];
  obstacles=[];bonuses=[];particles=[];
  lastOb=0;lastBon=0;rinkOffset=0;
  updateLives();
  document.getElementById('score-display').textContent='0';
  document.getElementById('level-display').textContent='LV 1';
  document.getElementById('combo-display').textContent='';
  document.getElementById('overlay').classList.add('hidden');
  state='playing'; cancelAnimationFrame(animId); loop();
};

function showGameOver() {
  const ov=document.getElementById('overlay');
  ov.classList.remove('hidden');
  document.getElementById('ov-title').textContent='GAME OVER';
  document.getElementById('ov-sub').textContent=`최고 콤보: ${maxCombo}×`;
  const se=document.getElementById('ov-score');
  se.style.display='block'; se.textContent=Math.floor(score);
  document.getElementById('ov-lbl').style.display='block';
  document.querySelector('.btn').textContent='다시하기';
}

drawRink();
</script>
</body>
</html>
