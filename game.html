
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICE DASH — 하키 런</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
/* === 원본 스타일 그대로 (변경 없음) === */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --accent: #00ccff;
  --bg: #08192e;
  --score-font: 'Bebas Neue', cursive;
  --body-font: 'Noto Sans KR', sans-serif;
}
body {
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: var(--body-font);
  overflow: hidden;
  user-select: none;
}
canvas { display:block; cursor:none; }
</style>
</head>

<body>

<!-- === (HTML 구조/DOM 전부 원본 그대로) === -->
<!-- header / tracker-bar / lives / canvas / overlay 그대로 -->

<script>
/* =====================================================
   CANVAS
===================================================== */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const puckIndicator = document.getElementById('puck-indicator');

const W = Math.min(520, window.innerWidth - 24);
const H = Math.min(680, window.innerHeight - 200);
canvas.width = W;
canvas.height = H;

/* =====================================================
   INPUT MODE
===================================================== */
let inputMode = 'mouse';

/* ✅ PUCK STATE (추가) */
let puck = {
  x: 0.5,
  y: 0.5,
  conf: 0,
  lastTs: 0
};

let connectedRoom = null;
let bc = null;

/* =====================================================
   CONNECT
===================================================== */
function connectCode() {
  const code = document.getElementById('code-input').value.toUpperCase().trim();
  if (code.length !== 4) { alert('4자리 코드를 입력하세요'); return; }
  connectRoom(code);
}

function connectRoom(code) {
  if (bc) try { bc.close(); } catch(e){}
  connectedRoom = code;
  bc = new BroadcastChannel('icedash_' + code);
  bc.onmessage = e => receivePuckData(e.data);
  inputMode = 'puck';
  document.getElementById('tracker-dot').className = 'live';
}

/* localStorage fallback 유지 */
setInterval(() => {
  if (!connectedRoom) return;
  try {
    const raw = localStorage.getItem('icedash_pos');
    if (!raw) return;
    const data = JSON.parse(raw);
    if (data.room === connectedRoom && data.ts > puck.lastTs) {
      receivePuckData(data);
    }
  } catch(e){}
}, 50);

/* =====================================================
   ✅ PUCK DATA (수정)
===================================================== */
function receivePuckData(data) {
  if (!data || typeof data.x !== 'number') return;

  puck.x = Math.max(0, Math.min(1, data.x));
  puck.y = Math.max(0, Math.min(1, data.y ?? 0.5));
  puck.conf = Math.max(0, Math.min(1, data.confidence ?? 0));
  puck.lastTs = data.ts || Date.now();

  if (puck.conf > 0.35) {
    puckIndicator.style.display = 'block';
    puckIndicator.style.left = (puck.x * W) + 'px';
    puckIndicator.style.top = (H - 80) + 'px';
    document.getElementById('tracker-dot').className = 'live';
  } else {
    puckIndicator.style.display = 'none';
  }
}

/* =====================================================
   MOUSE INPUT (원본)
===================================================== */
let mouseX = W / 2;
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.clientX - rect.left) * (W / rect.width);
});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.touches[0].clientX - rect.left) * (W / rect.width);
}, { passive:false });

/* =====================================================
   ✅ TARGET X (핵심 수정 지점)
===================================================== */
function getTargetX() {
  const alive = Date.now() - puck.lastTs < 800;
  const confident = puck.conf > 0.35;

  if (inputMode === 'puck' && alive && confident) {
    return puck.x * W;
  }
  return mouseX;
}

/* =====================================================
   ===== 이하: 게임 로직 / 장애물 / 콤보 / 목숨 =====
   ✅ 원본 코드 그대로 (절대 수정 없음)
===================================================== */

/* drawRink / spawnObstacle / hitPlayer / update / draw / loop
   → 당신이 올린 코드 그대로 유지 */

</script>
</body>
</html>
