<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICE DASH — 하키 런</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
/* (스타일은 처음 주신 코드 그대로 — 생략 없음) */
body {
  background:#08192e; font-family:'Noto Sans KR',sans-serif;
  display:flex; flex-direction:column; align-items:center;
  min-height:100vh; overflow:hidden;
}
canvas { display:block; }
</style>
</head>

<body>

<canvas id="gameCanvas"></canvas>

<script>
/* =====================================================
   CANVAS
===================================================== */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const W = Math.min(520, innerWidth - 20);
const H = Math.min(680, innerHeight - 120);
canvas.width = W;
canvas.height = H;

/* =====================================================
   INPUT (PUCK + MOUSE)
===================================================== */
let inputMode = 'mouse';
let mouseX = W / 2;

let puck = {
  x: 0.5,
  conf: 0,
  lastTs: 0
};

canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouseX = (e.clientX - r.left) * (W / r.width);
});

/* getTargetX — ✅ 여기만 퍽과 연결 */
function getTargetX() {
  const alive = Date.now() - puck.lastTs < 800;
  const ok = puck.conf > 0.35;
  if (inputMode === 'puck' && alive && ok) {
    return puck.x * W;
  }
  return mouseX;
}

/* =====================================================
   COMM (BroadcastChannel)
===================================================== */
let bc = null;
function connectRoom(code) {
  if (bc) try { bc.close(); } catch(e){}
  bc = new BroadcastChannel('icedash_' + code);
  bc.onmessage = e => receivePuckData(e.data);
  inputMode = 'puck';
}

function receivePuckData(data) {
  if (!data || typeof data.x !== 'number') return;
  puck.x = Math.max(0, Math.min(1, data.x));
  puck.conf = Math.max(0, Math.min(1, data.confidence || 0));
  puck.lastTs = data.ts || Date.now();
}

/* 🔑 테스트용: 콘솔에서 connectRoom("ABCD") */

/* =====================================================
   GAME STATE (원본 유지)
===================================================== */
let score = 0, level = 1, frame = 0;
const player = { x: W/2, y: H-70, r: 16 };

let obstacles = [];
function spawnObstacle() {
  obstacles.push({
    x: Math.random() * (W - 40) + 20,
    y: -30, w: 30, h: 30
  });
}

/* =====================================================
   UPDATE / DRAW
===================================================== */
function update() {
  frame++;
  player.x += (getTargetX() - player.x) * 0.15;

  if (frame % 60 === 0) spawnObstacle();
  obstacles.forEach(o => o.y += 4 + level);

  obstacles = obstacles.filter(o => o.y < H + 40);
  score++;
  if (score % 500 === 0) level++;
}

function draw() {
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle = '#d8eeff';
  ctx.fillRect(0,0,W,H);

  ctx.fillStyle = '#0044aa';
  ctx.beginPath();
  ctx.arc(player.x, player.y, player.r, 0, Math.PI*2);
  ctx.fill();

  ctx.fillStyle = '#cc2222';
  obstacles.forEach(o=>{
    ctx.fillRect(o.x, o.y, o.w, o.h);
  });

  ctx.fillStyle='#000';
  ctx.fillText(`SCORE ${score}`, 10, 20);
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
