<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICE DASH — 하키 런</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --accent: #00ccff;
    --bg: #08192e;
    --score-font: 'Bebas Neue', cursive;
    --body-font: 'Noto Sans KR', sans-serif;
  }
  body {
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: var(--body-font);
    overflow: hidden;
    user-select: none;
  }
  #header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 8px;
    width: 100%;
    max-width: 520px;
    padding: 0 4px;
  }
  #title { font-family: var(--score-font); font-size: 36px; letter-spacing: 4px; color: var(--accent); text-shadow: 0 0 18px rgba(0,204,255,0.5); line-height: 1; }
  #score-display { font-family: var(--score-font); font-size: 28px; color: white; letter-spacing: 2px; margin-left: auto; }
  #level-display { font-family: var(--score-font); font-size: 20px; color: #88bbdd; letter-spacing: 2px; }
  #combo-display { font-family: var(--score-font); font-size: 22px; color: #ffcc00; letter-spacing: 2px; min-width: 100px; }

  #tracker-bar {
    width: 100%;
    max-width: 520px;
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
    padding: 8px 12px;
    background: rgba(14,37,64,0.8);
    border-radius: 10px;
    font-size: 13px;
    color: #99bbcc;
  }
  #tracker-dot { width: 9px; height: 9px; border-radius: 50%; background: #334455; flex-shrink: 0; transition: background 0.3s; }
  #tracker-dot.live { background: #00ccff; box-shadow: 0 0 8px #00ccff; animation: tp 0.8s infinite alternate; }
  #tracker-dot.mouse { background: #ffcc00; box-shadow: 0 0 6px #ffcc00; }
  @keyframes tp { from { opacity:1; } to { opacity:0.3; } }
  #tracker-status { flex: 1; }
  #code-input-wrap { display: flex; gap: 6px; }
  #code-input {
    font-family: var(--score-font); font-size: 16px; letter-spacing: 3px;
    background: #0a1e36; border: 1px solid #1a3a5c; color: var(--accent);
    border-radius: 6px; padding: 4px 10px; width: 80px; text-align: center;
    text-transform: uppercase;
  }
  #code-input::placeholder { color: #223344; }
  #connect-btn {
    font-family: var(--score-font); font-size: 14px; letter-spacing: 1px;
    background: var(--accent); color: #08192e; border: none;
    border-radius: 6px; padding: 4px 10px; cursor: pointer;
  }

  #lives { display: flex; gap: 8px; margin-bottom: 8px; width: 100%; max-width: 520px; padding: 0 4px; }
  .life-dot { width: 14px; height: 14px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px rgba(0,204,255,0.6); transition: background 0.2s; }
  .life-dot.lost { background: #223344; box-shadow: none; }

  #canvas-wrap {
    position: relative;
    border: 3px solid #1a3a5c;
    border-radius: 32px;
    overflow: hidden;
    box-shadow: 0 0 60px rgba(0,100,200,0.4), 0 0 0 1px rgba(0,200,255,0.15);
  }
  canvas { display: block; cursor: none; }

  #overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(8,25,46,0.88);
    backdrop-filter: blur(4px);
    border-radius: 30px;
    transition: opacity 0.3s;
  }
  #overlay.hidden { opacity: 0; pointer-events: none; }

  .overlay-title { font-family: var(--score-font); font-size: 48px; letter-spacing: 6px; color: var(--accent); text-shadow: 0 0 30px rgba(0,204,255,0.7); margin-bottom: 8px; }
  .overlay-sub { font-size: 14px; color: #99bbcc; margin-bottom: 28px; text-align: center; line-height: 1.8; }
  .final-score { font-family: var(--score-font); font-size: 72px; color: white; letter-spacing: 4px; line-height: 1; margin-bottom: 4px; }
  .score-label { font-size: 13px; color: #667788; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 28px; }

  .btn {
    font-family: var(--score-font); font-size: 22px; letter-spacing: 3px;
    color: #08192e; background: var(--accent); border: none;
    border-radius: 8px; padding: 14px 44px; cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 0 20px rgba(0,204,255,0.4);
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 0 32px rgba(0,204,255,0.7); }

  #mode-toggle {
    margin-top: 16px;
    font-family: var(--score-font); font-size: 14px; letter-spacing: 2px;
    color: #445566; background: none; border: 1px solid #223344;
    border-radius: 6px; padding: 8px 20px; cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
  }
  #mode-toggle:hover { color: #99bbcc; border-color: #445566; }

  #puck-indicator {
    position: absolute;
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 2px solid rgba(0,204,255,0.6);
    pointer-events: none;
    transform: translate(-50%, -50%);
    transition: left 0.05s, top 0.05s;
    display: none;
  }
  #puck-indicator::after {
    content: '';
    position: absolute;
    inset: 4px;
    border-radius: 50%;
    background: rgba(0,204,255,0.2);
  }
</style>
</head>
<body>

<div id="header">
  <div id="title">ICE DASH</div>
  <div id="combo-display"></div>
  <div id="level-display">LV 1</div>
  <div id="score-display">0</div>
</div>

<div id="tracker-bar">
  <div id="tracker-dot"></div>
  <div id="tracker-status">마우스 모드로 플레이 중</div>
  <div id="code-input-wrap">
    <input id="code-input" type="text" maxlength="4" placeholder="코드">
    <button id="connect-btn" onclick="connectCode()">연결</button>
  </div>
</div>

<div id="lives">
  <div class="life-dot" id="life0"></div>
  <div class="life-dot" id="life1"></div>
  <div class="life-dot" id="life2"></div>
</div>

<div id="canvas-wrap">
  <canvas id="gameCanvas"></canvas>
  <div id="puck-indicator"></div>

  <div id="overlay">
    <div class="overlay-title" id="ov-title">ICE DASH</div>
    <div class="overlay-sub" id="ov-sub">
      마우스로 플레이하거나<br>
      스마트폰에서 <strong style="color:var(--accent)">camera_tracker.html</strong>을 열고<br>
      코드를 입력해 퍽으로 조종하세요!
    </div>
    <div class="final-score" id="ov-score" style="display:none"></div>
    <div class="score-label" id="ov-label" style="display:none">SCORE</div>
    <button class="btn" id="startBtn" onclick="startGame()">시작하기</button>
    <button id="mode-toggle" onclick="toggleInputMode()">🖱️ 마우스 / 🏒 퍽 전환</button>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const puckIndicator = document.getElementById('puck-indicator');

const W = Math.min(520, window.innerWidth - 24);
const H = Math.min(680, window.innerHeight - 200);
canvas.width = W;
canvas.height = H;

// Input modes: 'mouse' | 'puck'
let inputMode = 'mouse';
let puckX = 0.5; // normalized 0-1
let connectedRoom = null;
let bc = null;
let lastPuckTime = 0;

// BroadcastChannel listener
function connectCode() {
  const code = document.getElementById('code-input').value.toUpperCase().trim();
  if (code.length !== 4) { alert('4자리 코드를 입력하세요'); return; }
  connectRoom(code);
}

function connectRoom(code) {
  if (bc) { try { bc.close(); } catch(e) {} }
  connectedRoom = code;
  try {
    bc = new BroadcastChannel('icedash_' + code);
    bc.onmessage = e => receivePuckData(e.data);
    document.getElementById('tracker-dot').className = 'live';
    document.getElementById('tracker-status').textContent = `퍽 연결됨 (${code}) — 퍽을 움직여보세요`;
    inputMode = 'puck';
  } catch(e) {
    document.getElementById('tracker-status').textContent = 'BroadcastChannel 미지원 — localStorage 폴링 사용';
  }
}

// Also poll localStorage (for cross-tab on same browser)
setInterval(() => {
  if (!connectedRoom) return;
  try {
    const raw = localStorage.getItem('icedash_pos');
    if (!raw) return;
    const data = JSON.parse(raw);
    if (data.room === connectedRoom && data.ts > lastPuckTime) {
      receivePuckData(data);
    }
  } catch(e) {}
}, 50);

function receivePuckData(data) {
  lastPuckTime = data.ts || Date.now();
  puckX = Math.max(0, Math.min(1, data.x));

  // Show puck indicator
  puckIndicator.style.display = 'block';
  puckIndicator.style.left = (puckX * W) + 'px';
  puckIndicator.style.top = (H - 80) + 'px';

  document.getElementById('tracker-dot').className = 'live';
  document.getElementById('tracker-status').textContent = `퍽 추적 중 — X: ${(puckX * 100).toFixed(0)}%`;
}

function toggleInputMode() {
  if (inputMode === 'mouse') {
    inputMode = 'puck';
    document.getElementById('tracker-dot').className = '';
    document.getElementById('tracker-status').textContent = '퍽 모드 — 코드를 입력하고 연결하세요';
  } else {
    inputMode = 'mouse';
    puckIndicator.style.display = 'none';
    document.getElementById('tracker-dot').className = 'mouse';
    document.getElementById('tracker-status').textContent = '마우스 모드로 플레이 중';
  }
}

// ── Game state ──
let state = 'idle';
let score = 0, lives = 3, level = 1, combo = 0, maxCombo = 0;
let frameCount = 0, animId;
let obstacles = [], bonuses = [], particles = [];
let rinkOffset = 0;
const LANES = 5;
const laneW = W / LANES;

// Player
const player = {
  x: W / 2, y: H - 80, r: 16,
  vx: 0, invincible: 0, trail: []
};

// Mouse input
let mouseX = W / 2;
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.clientX - rect.left) * (W / rect.width);
});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.touches[0].clientX - rect.left) * (W / rect.width);
}, { passive: false });

let cursorX = W / 2, cursorY = H / 2;
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  cursorX = (e.clientX - rect.left) * (W / rect.width);
  cursorY = (e.clientY - rect.top) * (H / rect.height);
});

function getTargetX() {
  if (inputMode === 'puck' && Date.now() - lastPuckTime < 500) {
    return puckX * W;
  }
  return mouseX;
}

function speed() { return 3 + level * 0.8 + score * 0.0008; }

function laneCenter(i) { return laneW * i + laneW / 2; }

function spawnObstacle() {
  const types = ['player','cone','board'];
  const type = types[Math.floor(Math.random() * types.length)];
  const lane = Math.floor(Math.random() * LANES);
  let w = 36, h = 36, color = '#ee3344';
  if (type === 'cone') { w = 22; h = 30; color = '#ff8800'; }
  if (type === 'board') { w = laneW * 1.4; h = 22; color = '#225588'; }
  obstacles.push({ x: laneCenter(lane) - w / 2, y: -h - 10, w, h, type, color, lane });
}

function spawnBonus() {
  const lane = Math.floor(Math.random() * LANES);
  bonuses.push({ x: laneCenter(lane), y: -20, r: 12, collected: false });
}

function addParticles(x, y, color, n = 10) {
  for (let i = 0; i < n; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = 1.5 + Math.random() * 3;
    particles.push({ x, y, vx: Math.cos(angle)*spd, vy: Math.sin(angle)*spd, r: 2+Math.random()*4, life: 1, color });
  }
}

function drawRink() {
  ctx.fillStyle = '#d8eeff';
  ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = '#c0d8ee'; ctx.lineWidth = 0.5;
  for (let y = (rinkOffset % 80) - 80; y < H + 80; y += 80) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
  ctx.strokeStyle = 'rgba(160,200,230,0.5)'; ctx.lineWidth = 1;
  ctx.setLineDash([8, 16]);
  for (let i = 1; i < LANES; i++) {
    const x = laneW * i;
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  ctx.setLineDash([]);
  const redY = ((rinkOffset * 0.5) % (H * 2)) - H;
  ctx.strokeStyle = 'rgba(220,50,60,0.35)'; ctx.lineWidth = 6;
  ctx.beginPath(); ctx.moveTo(0, redY); ctx.lineTo(W, redY); ctx.stroke();
  ctx.strokeStyle = 'rgba(50,100,200,0.25)'; ctx.lineWidth = 4;
  [-H*0.3, H*0.3].forEach(offset => {
    const by = ((rinkOffset * 0.5 + offset) % (H * 2)) - H;
    ctx.beginPath(); ctx.moveTo(0, by); ctx.lineTo(W, by); ctx.stroke();
  });
  ctx.fillStyle = '#336699';
  ctx.fillRect(0, 0, 6, H); ctx.fillRect(W-6, 0, 6, H);
}

function drawPlayer() {
  const p = player;
  p.trail.forEach((t, i) => {
    const alpha = (i / p.trail.length) * 0.35;
    ctx.strokeStyle = `rgba(100,180,255,${alpha})`;
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(t.x, t.y, p.r * 0.5, 0, Math.PI * 2); ctx.stroke();
  });
  if (p.invincible > 0 && Math.floor(frameCount / 4) % 2 === 0) return;

  ctx.fillStyle = 'rgba(0,50,100,0.18)';
  ctx.beginPath(); ctx.ellipse(p.x+3, p.y+4, p.r, p.r*0.5, 0, 0, Math.PI*2); ctx.fill();

  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.ellipse(p.x-6, p.y+p.r-2, 8, 4, -0.3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(p.x+6, p.y+p.r-2, 8, 4, 0.3, 0, Math.PI*2); ctx.fill();

  ctx.fillStyle = '#1a2a8a';
  ctx.fillRect(p.x-10, p.y, 8, 14); ctx.fillRect(p.x+2, p.y, 8, 14);

  const grad = ctx.createRadialGradient(p.x, p.y-6, 2, p.x, p.y-6, 16);
  grad.addColorStop(0, '#2266ee'); grad.addColorStop(1, '#0033aa');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.roundRect(p.x-13, p.y-20, 26, 22, 5); ctx.fill();

  ctx.fillStyle = 'white'; ctx.font = 'bold 9px Bebas Neue, sans-serif';
  ctx.textAlign = 'center'; ctx.fillText('99', p.x, p.y-6);

  ctx.fillStyle = '#1144bb';
  ctx.beginPath(); ctx.arc(p.x, p.y-26, 11, 0, Math.PI*2); ctx.fill();

  ctx.strokeStyle = '#88aaff'; ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(p.x-7, p.y-21); ctx.lineTo(p.x-5, p.y-17);
  ctx.moveTo(p.x-2, p.y-21); ctx.lineTo(p.x-1, p.y-17);
  ctx.moveTo(p.x+3, p.y-21); ctx.lineTo(p.x+3, p.y-17);
  ctx.stroke();

  ctx.strokeStyle = '#8B4513'; ctx.lineWidth = 3; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(p.x+12, p.y-10); ctx.lineTo(p.x+22, p.y+8); ctx.stroke();
  ctx.strokeStyle = '#555'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(p.x+19, p.y+4); ctx.lineTo(p.x+30, p.y+10); ctx.stroke();

  if (p.invincible > 0) {
    ctx.strokeStyle = `rgba(0,255,255,${0.5 + Math.sin(frameCount*0.3)*0.3})`;
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(p.x, p.y-12, p.r+6, 0, Math.PI*2); ctx.stroke();
  }
}

function drawObstacles() {
  obstacles.forEach(ob => {
    ctx.save(); ctx.translate(ob.x + ob.w/2, ob.y + ob.h/2);
    if (ob.type === 'player') {
      ctx.fillStyle = '#cc1122';
      ctx.beginPath(); ctx.roundRect(-13,-10,26,18,4); ctx.fill();
      ctx.fillStyle = '#880000';
      ctx.beginPath(); ctx.arc(0,-18,10,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = 'white'; ctx.font = 'bold 8px Bebas Neue, sans-serif';
      ctx.textAlign = 'center'; ctx.fillText('44', 0, -3);
    } else if (ob.type === 'cone') {
      ctx.fillStyle = '#ff8800';
      ctx.beginPath(); ctx.moveTo(0,-ob.h/2); ctx.lineTo(-ob.w/2,ob.h/2); ctx.lineTo(ob.w/2,ob.h/2); ctx.closePath(); ctx.fill();
      ctx.fillStyle = 'white'; ctx.fillRect(-ob.w/2, ob.h/4-3, ob.w, 5);
    } else {
      const bg = ctx.createLinearGradient(-ob.w/2,0,ob.w/2,0);
      bg.addColorStop(0,'#1a3a66'); bg.addColorStop(0.5,'#2255aa'); bg.addColorStop(1,'#1a3a66');
      ctx.fillStyle = bg;
      ctx.beginPath(); ctx.roundRect(-ob.w/2,-ob.h/2,ob.w,ob.h,4); ctx.fill();
      ctx.strokeStyle = '#88aaff'; ctx.lineWidth = 1; ctx.stroke();
    }
    ctx.restore();
  });
}

function drawBonuses() {
  bonuses.forEach(b => {
    if (b.collected) return;
    const pulse = Math.sin(frameCount * 0.1) * 3;
    const grd = ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r+10+pulse);
    grd.addColorStop(0,'rgba(255,220,0,0.5)'); grd.addColorStop(1,'rgba(255,220,0,0)');
    ctx.fillStyle = grd;
    ctx.beginPath(); ctx.arc(b.x,b.y,b.r+10+pulse,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ffcc00';
    ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ff8800'; ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('★', b.x, b.y+4);
  });
}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawCursor() {
  if (state !== 'playing' || inputMode === 'puck') return;
  ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.strokeStyle = 'rgba(0,204,255,0.8)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.ellipse(cursorX, cursorY, 14, 9, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.beginPath(); ctx.ellipse(cursorX-3, cursorY-2, 5, 3, -0.4, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = 'rgba(0,200,255,0.15)'; ctx.lineWidth = 1;
  ctx.setLineDash([4,8]);
  ctx.beginPath(); ctx.moveTo(cursorX, cursorY); ctx.lineTo(player.x, player.y-20); ctx.stroke();
  ctx.setLineDash([]);
}

function checkCollision(p, ob) {
  if (ob.type === 'board') {
    return p.x+p.r > ob.x && p.x-p.r < ob.x+ob.w && p.y+p.r > ob.y && p.y-p.r < ob.y+ob.h;
  }
  const cx = Math.max(ob.x, Math.min(p.x, ob.x+ob.w));
  const cy = Math.max(ob.y, Math.min(p.y, ob.y+ob.h));
  const dx = p.x-cx, dy = p.y-cy;
  return dx*dx+dy*dy < (p.r*0.8)*(p.r*0.8);
}

function hitPlayer() {
  if (player.invincible > 0) return;
  lives--; player.invincible = 90; combo = 0; updateCombo();
  addParticles(player.x, player.y, '#ff4444', 16);
  updateLives();
  if (lives <= 0) { state = 'gameover'; showGameOver(); }
}

function updateLives() {
  for (let i = 0; i < 3; i++) document.getElementById('life'+i).classList.toggle('lost', i >= lives);
}

function updateCombo() {
  const el = document.getElementById('combo-display');
  el.textContent = combo >= 3 ? `${combo}× COMBO` : '';
}

let lastObstacle = 0, lastBonus = 0;

function update() {
  frameCount++; rinkOffset += speed();
  const tx = getTargetX();
  const dx = tx - player.x;
  player.vx = dx * 0.12;
  player.x += player.vx;
  player.x = Math.max(player.r+6, Math.min(W-player.r-6, player.x));
  player.trail.push({ x: player.x, y: player.y });
  if (player.trail.length > 12) player.trail.shift();
  if (player.invincible > 0) player.invincible--;

  const spawnInterval = Math.max(40, 80 - level*6);
  if (frameCount - lastObstacle > spawnInterval) { spawnObstacle(); lastObstacle = frameCount; }
  if (frameCount - lastBonus > 120) { spawnBonus(); lastBonus = frameCount; }

  obstacles.forEach(ob => { ob.y += speed(); });
  bonuses.forEach(b => { b.y += speed(); });
  particles.forEach(p => { p.x+=p.vx; p.y+=p.vy; p.vy+=0.1; p.life-=0.03; });

  obstacles.forEach(ob => { if (checkCollision(player, ob)) hitPlayer(); });
  bonuses.forEach(b => {
    if (b.collected) return;
    const dx=player.x-b.x, dy=player.y-b.y;
    if (dx*dx+dy*dy < (player.r+b.r)*(player.r+b.r)) {
      b.collected = true; combo++; maxCombo=Math.max(maxCombo,combo);
      score += 50 * (1 + Math.floor(combo/3));
      addParticles(b.x,b.y,'#ffcc00',12); updateCombo();
    }
  });

  if (frameCount % 6 === 0) score += 1 + Math.floor(combo/3);

  const newLevel = Math.floor(score/500)+1;
  if (newLevel !== level) {
    level = newLevel;
    document.getElementById('level-display').textContent = `LV ${level}`;
    addParticles(player.x, player.y, '#00ccff', 20);
  }

  obstacles = obstacles.filter(ob => ob.y < H+60);
  bonuses = bonuses.filter(b => b.y < H+40 && !b.collected);
  particles = particles.filter(p => p.life > 0);
  document.getElementById('score-display').textContent = Math.floor(score);
}

function draw() {
  ctx.clearRect(0,0,W,H);
  drawRink(); drawBonuses(); drawObstacles(); drawParticles(); drawPlayer(); drawCursor();
}

function loop() {
  if (state === 'playing') { update(); draw(); animId = requestAnimationFrame(loop); }
}

function startGame() {
  score=0; lives=3; level=1; combo=0; frameCount=0; maxCombo=0;
  player.x=W/2; player.vx=0; player.invincible=0; player.trail=[];
  obstacles=[]; bonuses=[]; particles=[];
  lastObstacle=0; lastBonus=0; rinkOffset=0;
  updateLives();
  document.getElementById('score-display').textContent='0';
  document.getElementById('level-display').textContent='LV 1';
  document.getElementById('combo-display').textContent='';
  document.getElementById('overlay').classList.add('hidden');
  state='playing'; cancelAnimationFrame(animId); loop();
}

function showGameOver() {
  const ov = document.getElementById('overlay');
  ov.classList.remove('hidden');
  document.getElementById('ov-title').textContent = 'GAME OVER';
  document.getElementById('ov-sub').textContent = `최고 콤보: ${maxCombo}×`;
  const se = document.getElementById('ov-score');
  se.style.display='block'; se.textContent=Math.floor(score);
  document.getElementById('ov-label').style.display='block';
  document.getElementById('startBtn').textContent='다시하기';
}

drawRink();
</script>
</body>
</html>
