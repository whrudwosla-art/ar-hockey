<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICE DASH — 하키 런</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">

<style>
/* ===== 원본 스타일 그대로 ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --accent: #00ccff;
  --bg: #08192e;
}

body {
  background: var(--bg);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'Noto Sans KR', sans-serif;
  overflow: hidden;
}

/* ===== UI 일부만 유지 (원본 그대로) ===== */
#gameCanvas { display:block; cursor:none; }
</style>
</head>

<body>

<canvas id="gameCanvas"></canvas>

<script>
/* =====================================================
   CANVAS
===================================================== */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const W = Math.min(520, window.innerWidth - 24);
const H = Math.min(680, window.innerHeight - 120);
canvas.width = W;
canvas.height = H;

/* =====================================================
   INPUT MODE
===================================================== */
let inputMode = 'mouse';
let mouseX = W / 2;

/* ✅ PUCK STATE (추가된 부분) */
let puck = {
  x: 0.5,
  y: 0.5,
  conf: 0,
  lastTs: 0
};

/* =====================================================
   MOUSE INPUT (원본)
===================================================== */
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.clientX - rect.left) * (W / rect.width);
});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.touches[0].clientX - rect.left) * (W / rect.width);
}, { passive:false });

/* =====================================================
   ✅ TARGET X (여기만 수정)
===================================================== */
function getTargetX() {
  const alive = Date.now() - puck.lastTs < 800;
  const confident = puck.conf > 0.35;

  if (inputMode === 'puck' && alive && confident) {
    return puck.x * W;
  }
  return mouseX;
}

/* =====================================================
   ✅ PUCK CONNECTION (추가)
===================================================== */
let bc = null;
function connectRoom(code) {
  if (bc) try { bc.close(); } catch(e){}
  bc = new BroadcastChannel('icedash_' + code);
  bc.onmessage = e => receivePuckData(e.data);
  inputMode = 'puck';
}

function receivePuckData(data) {
  if (!data || typeof data.x !== 'number') return;
  puck.x = Math.max(0, Math.min(1, data.x));
  puck.y = Math.max(0, Math.min(1, data.y ?? 0.5));
  puck.conf = Math.max(0, Math.min(1, data.confidence ?? 0));
  puck.lastTs = data.ts || Date.now();
}

/* =====================================================
   ===== 이하부터는 "처음 주신 게임 로직 그대로" =====
===================================================== */

let score = 0, lives = 3, level = 1, combo = 0;
let frameCount = 0;

const LANES = 5;
const laneW = W / LANES;

const player = {
  x: W / 2,
  y: H - 80,
  r: 16,
  vx: 0,
  invincible: 0,
};

let obstacles = [];
let bonuses = [];

/* ===== 속도 ===== */
function speed() {
  return 3 + level * 0.8;
}

function laneCenter(i) {
  return laneW * i + laneW / 2;
}

/* ===== 장애물 ===== */
function spawnObstacle() {
  const types = ['player', 'cone', 'board'];
  const type = types[Math.floor(Math.random() * types.length)];
  const lane = Math.floor(Math.random() * LANES);

  let w = 36, h = 36;
  if (type === 'cone') { w = 22; h = 30; }
  if (type === 'board') { w = laneW * 1.4; h = 22; }

  obstacles.push({
    x: laneCenter(lane) - w / 2,
    y: -h - 10,
    w, h, type,
  });
}

/* ===== 보너스 ===== */
function spawnBonus() {
  const lane = Math.floor(Math.random() * LANES);
  bonuses.push({
    x: laneCenter(lane),
    y: -20,
    r: 12,
    collected: false,
  });
}

/* ===== 충돌 ===== */
function checkCollision(p, ob) {
  const cx = Math.max(ob.x, Math.min(p.x, ob.x + ob.w));
  const cy = Math.max(ob.y, Math.min(p.y, ob.y + ob.h));
  const dx = p.x - cx;
  const dy = p.y - cy;
  return dx * dx + dy * dy < p.r * p.r;
}

function hitPlayer() {
  if (player.invincible > 0) return;
  lives--;
  combo = 0;
  player.invincible = 90;
  if (lives <= 0) {
    score = 0;
    lives = 3;
    level = 1;
  }
}

/* =====================================================
   UPDATE
===================================================== */
function update() {
  frameCount++;

  const tx = getTargetX();
  player.vx = (tx - player.x) * 0.15;
  player.x += player.vx;
  player.x = Math.max(16, Math.min(W - 16, player.x));

  if (player.invincible > 0) player.invincible--;

  if (frameCount % Math.max(40, 80 - level * 6) === 0) spawnObstacle();
  if (frameCount % 140 === 0) spawnBonus();

  obstacles.forEach(o => o.y += speed());
  bonuses.forEach(b => b.y += speed());

  obstacles.forEach(o => {
    if (checkCollision(player, o)) hitPlayer();
  });

  bonuses.forEach(b => {
    if (b.collected) return;
    const dx = player.x - b.x;
    const dy = player.y - b.y;
    if (dx * dx + dy * dy < (player.r + b.r) ** 2) {
      b.collected = true;
      combo++;
      score += 50 * (1 + Math.floor(combo / 3));
    }
  });

  obstacles = obstacles.filter(o => o.y < H + 50);
  bonuses   = bonuses.filter(b => b.y < H + 50 && !b.collected);

  score++;
  if (score % 500 === 0) level++;
}

/* =====================================================
   DRAW
===================================================== */
function draw() {
  ctx.fillStyle = '#d8eeff';
  ctx.fillRect(0, 0, W, H);

  if (!(player.invincible > 0 && frameCount % 8 < 4)) {
    ctx.fillStyle = '#0044aa';
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.r, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.fillStyle = '#cc2222';
  obstacles.forEach(o => ctx.fillRect(o.x, o.y, o.w, o.h));

  ctx.fillStyle = '#ffcc00';
  bonuses.forEach(b => {
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.fill();
  });

  ctx.fillStyle = '#000';
  ctx.font = '14px sans-serif';
  ctx.fillText(`SCORE ${score}`, 12, 22);
  ctx.fillText(`LIVES ${lives}`, 12, 40);
}

/* =====================================================
   LOOP
===================================================== */
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();

/* 콘솔에서 connectRoom("ABCD") */
</script>

</body>
</html>
